<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honor Board — In-Call Outsourcing</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏅</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────
   DESIGN SYSTEM
───────────────────────────────────── */
:root {
  --white:    #FFFFFF;
  --off:      #F7F8FC;
  --border:   #E2E6F0;
  --text:     #0B0F1A;
  --muted:    #6B7280;
  --faint:    #9CA3AF;
  --blue:     #1D4ED8;
  --blue-s:   #EFF6FF;
  --blue-b:   rgba(29,78,216,.15);
  --gold:     #B45309;
  --gold-s:   #FFFBEB;
  --gold-b:   rgba(180,83,9,.18);
  --silver:   #475569;
  --silver-s: #F8FAFC;
  --bronze:   #92400E;
  --green:    #047857;
  --green-s:  #ECFDF5;
  --purple:   #6D28D9;
  --purple-s: #F5F3FF;
  --font: 'Outfit', -apple-system, sans-serif;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--off); }
body { font-family:var(--font); color:var(--text); display:flex; flex-direction:column; }

/* ─────────────────────────────────────
   LOADING
───────────────────────────────────── */
#loading {
  position:fixed; inset:0; z-index:9999;
  background:#fff; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px;
  transition:opacity .6s ease, visibility .6s ease;
}
#loading.hide { opacity:0; visibility:hidden; pointer-events:none; }
.ld-ring {
  width:80px; height:80px; border-radius:50%;
  border:3px solid var(--border);
  border-top-color:var(--blue);
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.ld-logo {
  position:absolute;
  width:48px; height:48px; border-radius:50%;
  background:#fff; display:flex; align-items:center; justify-content:center;
  overflow:hidden;
}
.ld-logo img { width:44px; height:44px; object-fit:contain; }
.ld-wrap { position:relative; width:80px; height:80px; display:flex; align-items:center; justify-content:center; }
.ld-text { font-size:.75rem; font-weight:600; color:var(--faint); letter-spacing:.12em; text-transform:uppercase; }

/* ─────────────────────────────────────
   TOPBAR
───────────────────────────────────── */
#topbar {
  flex-shrink:0; display:flex; align-items:center;
  justify-content:space-between; padding:0 40px;
  height:64px; background:#fff;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 0 var(--border);
  position:relative; z-index:50;
}
.tb-left { display:flex; align-items:center; gap:12px; }
.tb-logo {
  width:40px; height:40px; border-radius:10px;
  overflow:hidden; border:1px solid var(--border);
  background:#fff; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.tb-logo img { width:38px; height:38px; object-fit:contain; }
.tb-brand { line-height:1.2; }
.tb-name { font-size:.92rem; font-weight:700; color:var(--text); }
.tb-sub  { font-size:.6rem;  font-weight:400; color:var(--faint); letter-spacing:.02em; }

.tb-center { position:absolute; left:50%; transform:translateX(-50%); text-align:center; }
.tb-month {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--blue-s); border:1px solid var(--blue-b);
  color:var(--blue); font-size:.68rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:5px 14px; border-radius:100px;
}
.tb-board { font-size:.78rem; font-weight:600; color:var(--muted); margin-top:2px; }

.tb-right { display:flex; align-items:center; gap:16px; }
.live-chip {
  display:flex; align-items:center; gap:5px;
  background:var(--green-s); border:1px solid rgba(4,120,87,.2);
  color:var(--green); font-size:.62rem; font-weight:700;
  letter-spacing:.1em; padding:4px 10px; border-radius:100px;
}
.live-dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.8s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.75)} }
.tb-time { font-size:.6rem; color:var(--faint); }

/* ─────────────────────────────────────
   SLIDES AREA
───────────────────────────────────── */
#arena { flex:1; position:relative; overflow:hidden; }

.slide {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:32px 40px;
  opacity:0; transform:translateX(60px);
  transition:opacity .55s cubic-bezier(.4,0,.2,1), transform .55s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.slide.active  { opacity:1; transform:translateX(0); pointer-events:auto; }
.slide.exit    { opacity:0; transform:translateX(-60px); }

/* ─────────────────────────────────────
   #1 HERO SLIDE
───────────────────────────────────── */
.hero-layout {
  display:grid; grid-template-columns:300px 1fr;
  gap:56px; align-items:center;
  width:100%; max-width:1020px;
}

/* Photo */
.hero-photo-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; }
.hero-ring-outer {
  width:230px; height:230px; border-radius:50%; position:relative;
}
.hero-ring-spin {
  position:absolute; inset:-5px; border-radius:50%;
  background:conic-gradient(#B45309 0%, #F59E0B 35%, #FBBF24 50%, #F59E0B 65%, #B45309 100%);
  animation:spin 7s linear infinite; z-index:0;
}
.hero-ring-inner {
  position:absolute; inset:6px; border-radius:50%; z-index:1;
  background:var(--off); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.hero-photo-img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.hero-initials {
  font-size:4.5rem; font-weight:900; color:var(--blue);
  line-height:1; user-select:none;
}
.hero-crown { font-size:2.8rem; filter:drop-shadow(0 3px 8px rgba(0,0,0,.2)); }

/* Info */
.hero-info {}
.hero-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--gold-s); border:1px solid var(--gold-b);
  color:var(--gold); font-size:.62rem; font-weight:800;
  letter-spacing:.14em; text-transform:uppercase;
  padding:5px 14px; border-radius:100px; margin-bottom:14px;
}
.hero-name {
  font-size:clamp(2rem,4vw,3.2rem); font-weight:900;
  line-height:1.0; color:var(--text); margin-bottom:6px;
}
.hero-role {
  font-size:.82rem; font-weight:500; color:var(--muted);
  background:var(--off); border:1px solid var(--border);
  display:inline-block; padding:4px 12px; border-radius:8px; margin-bottom:22px;
}
.hero-quote {
  font-size:.95rem; font-weight:300; color:var(--muted);
  line-height:1.75; border-left:3px solid var(--blue);
  padding-left:16px; margin-bottom:28px; font-style:italic;
  max-width:480px;
}
.hero-metrics { display:flex; gap:12px; flex-wrap:wrap; }
.metric-card {
  flex:1; min-width:90px; max-width:140px;
  background:#fff; border:1.5px solid var(--border);
  border-radius:14px; padding:14px 16px;
  position:relative; overflow:hidden;
}
.metric-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
}
.mc-sales::before { background:var(--green); }
.mc-dos::before   { background:var(--blue); }
.mc-tasks::before { background:var(--purple); }
.mc-label { font-size:.58rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin-bottom:6px; }
.mc-val   { font-size:1.6rem; font-weight:800; line-height:1; }
.mc-sales .mc-val { color:var(--green); }
.mc-dos   .mc-val { color:var(--blue); }
.mc-tasks .mc-val { color:var(--purple); }

/* ─────────────────────────────────────
   #2/#3 SPLIT SLIDE
───────────────────────────────────── */
.split-layout {
  display:grid; grid-template-columns:340px 1fr;
  gap:40px; align-items:start;
  width:100%; max-width:960px;
}
.split-card {
  background:#fff; border:1.5px solid var(--border);
  border-radius:24px; padding:32px 24px;
  display:flex; flex-direction:column; align-items:center;
  text-align:center; position:relative; overflow:hidden;
  box-shadow:0 2px 20px rgba(0,0,0,.04);
}
.split-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:4px;
}
.sc-silver::before { background:linear-gradient(90deg,#64748B,#94A3B8); }
.sc-bronze::before { background:linear-gradient(90deg,#92400E,#CA8A04); }
.sc-other::before  { background:linear-gradient(90deg,var(--blue),var(--purple)); }

.split-ring-wrap { width:130px; height:130px; border-radius:50%; position:relative; margin-bottom:14px; }
.split-ring-spin {
  position:absolute; inset:-4px; border-radius:50%; animation:spin 9s linear infinite; z-index:0;
}
.sr-silver { background:conic-gradient(#64748B,#CBD5E1,#64748B); }
.sr-bronze { background:conic-gradient(#92400E,#D97706,#92400E); }
.sr-other  { background:conic-gradient(var(--blue),var(--purple),var(--blue)); }
.split-ring-inner {
  position:absolute; inset:4px; border-radius:50%; z-index:1;
  background:var(--off); overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.split-ring-inner img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.split-initials { font-size:2.6rem; font-weight:900; color:var(--blue); user-select:none; }
.split-medal { font-size:2rem; margin-bottom:8px; }
.split-rank-chip {
  font-size:.58rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
  padding:3px 10px; border-radius:100px; margin-bottom:10px; display:inline-block;
}
.src-silver { background:rgba(100,116,139,.1); color:var(--silver); border:1px solid rgba(100,116,139,.22); }
.src-bronze { background:rgba(146,64,14,.08); color:var(--bronze); border:1px solid rgba(146,64,14,.2); }
.src-other  { background:var(--blue-s); color:var(--blue); border:1px solid var(--blue-b); }
.split-name { font-size:1.5rem; font-weight:800; line-height:1.1; margin-bottom:4px; }
.split-role { font-size:.72rem; color:var(--muted); margin-bottom:12px; }
.split-quote { font-size:.78rem; color:var(--muted); font-style:italic; line-height:1.65; margin-bottom:14px; border-left:2px solid var(--border); padding-left:10px; text-align:left; }
.split-pills { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; }
.pill { font-size:.7rem; font-weight:600; padding:5px 12px; border-radius:10px; }
.p-sales { background:var(--green-s); color:var(--green); }
.p-dos   { background:var(--blue-s); color:var(--blue); }
.p-tasks { background:var(--purple-s); color:var(--purple); }

/* Rest list (right side of split) */
.rest-col { display:flex; flex-direction:column; justify-content:center; gap:10px; }
.rest-label {
  font-size:.6rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--faint); display:flex; align-items:center; gap:10px; margin-bottom:4px;
}
.rest-label::after { content:''; flex:1; height:1px; background:var(--border); }
.rest-row {
  background:#fff; border:1.5px solid var(--border); border-radius:12px;
  padding:11px 14px; display:grid;
  grid-template-columns:26px 36px 1fr auto;
  align-items:center; gap:10px;
  transition:transform .18s;
}
.rest-row:hover { transform:translateX(4px); }
.rest-num { font-size:.75rem; font-weight:800; color:var(--faint); }
.rest-av {
  width:34px; height:34px; border-radius:50%;
  background:var(--off); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:.7rem; font-weight:800; color:var(--blue); overflow:hidden;
}
.rest-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.rest-info {}
.rest-name { font-size:.83rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rest-role { font-size:.6rem; color:var(--muted); margin-top:1px; }
.rest-vals { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
.rv { font-size:.6rem; font-weight:700; padding:2px 7px; border-radius:6px; }
.rv-s { background:var(--green-s); color:var(--green); }
.rv-d { background:var(--blue-s); color:var(--blue); }
.rv-t { background:var(--purple-s); color:var(--purple); }

/* ─────────────────────────────────────
   CELEBRATION OVERLAY
───────────────────────────────────── */
#celeb {
  position:fixed; inset:0; z-index:800;
  display:none; align-items:center; justify-content:center;
  background:rgba(11,15,26,.6); backdrop-filter:blur(6px);
}
#celeb.show { display:flex; }
#confetti-canvas { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
.celeb-box {
  position:relative; z-index:2;
  background:#fff; border-radius:28px;
  padding:44px 60px; text-align:center;
  border:2px solid #FCD34D;
  box-shadow:0 32px 80px rgba(0,0,0,.25);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn { from{opacity:0;transform:scale(.6) translateY(40px)} to{opacity:1;transform:scale(1) translateY(0)} }
.celeb-box.out { animation:popOut .4s ease both; }
@keyframes popOut { to{opacity:0;transform:scale(.85)} }
.celeb-trophy { font-size:4rem; line-height:1; margin-bottom:12px; }
.celeb-name { font-size:2.2rem; font-weight:900; color:var(--text); line-height:1.1; }
.celeb-label { font-size:.82rem; color:var(--muted); margin-top:8px; font-weight:500; }

/* ─────────────────────────────────────
   PROGRESS + DOTS
───────────────────────────────────── */
#progress {
  position:absolute; bottom:0; left:0; right:0; height:3px;
  background:rgba(0,0,0,.06); z-index:20;
}
#progress-fill {
  height:100%;
  background:linear-gradient(90deg,var(--blue),var(--purple));
  border-radius:0 3px 3px 0; width:0%;
}

#dotsbar {
  flex-shrink:0; height:44px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:#fff; border-top:1px solid var(--border);
}
.dot {
  width:7px; height:7px; border-radius:100px; background:var(--border);
  cursor:pointer; transition:background .25s, width .3s, transform .25s;
}
.dot.on { background:var(--blue); width:22px; transform:none; }

/* ─────────────────────────────────────
   MUSIC
───────────────────────────────────── */
#music {
  position:fixed; bottom:56px; right:24px; z-index:100;
  background:#fff; border:1.5px solid var(--border);
  border-radius:14px; padding:11px 14px;
  display:none; align-items:center; gap:10px;
  box-shadow:0 4px 24px rgba(0,0,0,.08); min-width:190px;
}
.mus-btn {
  width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
  background:var(--blue-s); color:var(--blue); cursor:pointer;
  display:flex; align-items:center; justify-content:center; font-size:.8rem;
  transition:background .2s, color .2s;
}
.mus-btn:hover { background:var(--blue); color:#fff; }
.mus-info { flex:1; min-width:0; }
.mus-title { font-size:.7rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mus-state { font-size:.58rem; color:var(--faint); margin-top:1px; }
.mus-bars { display:flex; align-items:flex-end; gap:2px; height:13px; }
.mb { width:3px; border-radius:2px; background:var(--blue); animation:mba .8s ease-in-out infinite alternate; }
.mb:nth-child(1){height:5px;animation-delay:0s}
.mb:nth-child(2){height:11px;animation-delay:.14s}
.mb:nth-child(3){height:7px;animation-delay:.28s}
.mb:nth-child(4){height:12px;animation-delay:.07s}
.mb:nth-child(5){height:4px;animation-delay:.21s}
@keyframes mba { from{transform:scaleY(.25)} to{transform:scaleY(1)} }
.mus-bars.off .mb { animation-play-state:paused; }

/* ─────────────────────────────────────
   ERROR BANNER
───────────────────────────────────── */
#errbanner {
  position:fixed; top:72px; left:50%; transform:translateX(-50%); z-index:300;
  background:#FEF2F2; border:1px solid #FECACA; color:#DC2626;
  padding:8px 18px; border-radius:10px; font-size:.73rem;
  display:none; white-space:nowrap;
}
#errbanner.show { display:block; }

/* ─────────────────────────────────────
   RESPONSIVE
───────────────────────────────────── */
@media(max-width:860px){
  .hero-layout { grid-template-columns:1fr; gap:28px; }
  .hero-ring-outer { width:150px; height:150px; }
  .hero-photo-wrap { flex-direction:row; gap:20px; align-items:center; }
  .hero-crown { font-size:1.8rem; }
  .split-layout { grid-template-columns:1fr; }
  #topbar { padding:0 20px; }
  .slide { padding:20px; }
  .tb-center { display:none; }
}
</style>
</head>

    <div class="tb-time" id="tb-time">Syncing…</div>
  </div>
</div>

<!-- ARENA -->
<div id="arena">
  <div id="progress"><div id="progress-fill"></div></div>
</div>

<!-- DOTS -->
<div id="dotsbar" id="dotsbar"></div>

<script>
// ══════════════════════════════════════════════════
//  ★ CONFIG
// ══════════════════════════════════════════════════
const API_URL  = 'https://script.google.com/macros/s/AKfycbwHytDYTFfHrn7VxlsUUhE6GxffBg_cq_iVK2-2EOrx4SoD35xL1HCIFbFwa78GcfTj5g/exec';
const SLIDE_MS = 30000;  // 30 seconds per slide
const CELEB_MS = 5000;   // celebration duration

// ── Demo data (shown until Sheet ID is set) ──────
const DEMO = {
  s: {
    month:      'March 2025',
    department: 'Sales Floor',
    company:    'In-Call Outsourcing',
    logo:       '',
    music_url:  '',
    music_name: '🎵 Team Vibes',
  },
  a: [
    { rank:1, name:'Ahmed Hassan',   role:'Star Agent',   comment:'Absolutely unstoppable — the whole team looks up to you.',  img:'', sales:'$14,200', dos:'',    tasks:''   },
    { rank:2, name:'Sara Mohamed',   role:'Top Closer',   comment:'Incredible consistency every single day. Keep it up!',      img:'', sales:'',        dos:'102', tasks:''   },
    { rank:3, name:'Khaled Youssef', role:'Deal Maker',   comment:'Outstanding results in a tough month.',                     img:'', sales:'',        dos:'',    tasks:'47' },
    { rank:4, name:'Nour El-Din',    role:'Rising Star',  comment:'',                                                           img:'', sales:'$7,500',  dos:'',    tasks:''   },
    { rank:5, name:'Dina Fathy',     role:'Closer',       comment:'',                                                           img:'', sales:'',        dos:'79',  tasks:''   },
  ]
};

// ── State ──────────────────────────────────────
let agents=[], slideEls=[], cur=0;
let progTimer=null, autoTimer=null, isPlaying=false;
let confAnim=null;

// ── API fetch (Google Apps Script Web App) ────────
async function loadData(){
  try {
    const res  = await fetch(API_URL);
    const json = await res.json();
    // json = { settings:{...}, agents:[...] }
    const raw = json.settings || {};
    const s = {
      month:      raw.month_title  || raw.month      || 'This Month',
      department: raw.department   || '',
      company:    raw.company_name || raw.company    || 'In-Call Outsourcing',
      logo:       raw.company_logo || raw.logo       || '',
      music_url:  raw.music_url    || '',
      music_name: raw.music_title  || raw.music_name || '🎵 Now Playing',
    };
    const a = (json.agents || []).sort((x,y) => +x.rank - +y.rank);
    return {s, a};
  } catch(e) {
    console.warn('API error, using demo data:', e);
    document.getElementById('errbanner').classList.add('show');
    return {s:DEMO.s, a:DEMO.a};
  }
}

// ── Helpers ────────────────────────────────────
const INI = n => (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const MEDALS=['🏆','🥈','🥉'];

function metricsOf(a){
  const m=[];
  if((a.sales||'').trim())                    m.push({l:'Sales',v:a.sales,t:'sales'});
  if((a.dos||a['dos_amount']||'').trim())     m.push({l:"DO's", v:a.dos||a.dos_amount,t:'dos'});
  if((a.tasks||'').trim())                    m.push({l:'Tasks',v:a.tasks,t:'tasks'});
  return m;
}
function photoHTML(img,name,cls,initCls){
  if(img&&img.startsWith('http'))
    return`<img src="${img}" alt="${name}" onerror="this.outerHTML='<span class=\\'${initCls}\\'>${INI(name)}</span>'" class="${cls}">`;
  return`<span class="${initCls}">${INI(name)}</span>`;
}

// ── Build slides ───────────────────────────────
function buildSlides(list){
  const arena=document.getElementById('arena');
  arena.querySelectorAll('.slide').forEach(s=>s.remove());
  slideEls=[];

  list.forEach((ag,i)=>{
    const rank=+ag.rank||(i+1);
    const metrics=metricsOf(ag);
    const el=document.createElement('div');
    el.className='slide';

    if(rank===1){
      // ── Hero layout
      const mHTML=metrics.map(m=>
        `<div class="metric-card mc-${m.t}">
           <div class="mc-label">${m.l}</div>
           <div class="mc-val">${m.v}</div>
         </div>`).join('');
      el.innerHTML=`
        <div class="hero-layout">
          <div class="hero-photo-wrap">
            <div class="hero-ring-outer">
              <div class="hero-ring-spin"></div>
              <div class="hero-ring-inner">
                ${photoHTML(ag.img||ag.image_url,ag.name,'hero-photo-img','hero-initials')}
              </div>
            </div>
            <div class="hero-crown">🏆</div>
          </div>
          <div class="hero-info">
            <div class="hero-badge">⭐ #1 — Gold</div>
            <div class="hero-name">${ag.name}</div>
            ${ag.role||ag.title?`<div class="hero-role">${ag.role||ag.title}</div>`:''}
            ${ag.comment?`<div class="hero-quote">"${ag.comment}"</div>`:''}
            ${mHTML?`<div class="hero-metrics">${mHTML}</div>`:''}
          </div>
        </div>`;
    } else {
      // ── Split layout
      const sc  = rank===2?'sc-silver':rank===3?'sc-bronze':'sc-other';
      const srs = rank===2?'sr-silver':rank===3?'sr-bronze':'sr-other';
      const src = rank===2?'src-silver':rank===3?'src-bronze':'src-other';
      const rl  = rank===2?'#2 — Silver':rank===3?'#3 — Bronze':`#${rank}`;
      const med = MEDALS[rank-1]||'🏅';
      const pills=metrics.map(m=>`<span class="pill p-${m.t}">${m.l}: ${m.v}</span>`).join('');
      const rest=list.filter(x=>+x.rank>rank).slice(0,6).map(x=>{
        const rv=metricsOf(x).map(m=>`<span class="rv rv-${m.t[0]}">${m.v}</span>`).join('');
        const av=x.img&&x.img.startsWith('http')
          ?`<img src="${x.img}" alt="" onerror="this.outerHTML='${INI(x.name)}'">` : INI(x.name);
        return`<div class="rest-row">
          <div class="rest-num">#${+x.rank||'?'}</div>
          <div class="rest-av">${av}</div>
          <div class="rest-info">
            <div class="rest-name">${x.name}</div>
            ${x.role||x.title?`<div class="rest-role">${x.role||x.title}</div>`:''}
          </div>
          <div class="rest-vals">${rv}</div>
        </div>`;
      }).join('');
      el.innerHTML=`
        <div class="split-layout">
          <div class="split-card ${sc}">
            <div class="split-ring-wrap">
              <div class="split-ring-spin ${srs}"></div>
              <div class="split-ring-inner">
                ${photoHTML(ag.img||ag.image_url,ag.name,'','split-initials')}
              </div>
            </div>
            <div class="split-medal">${med}</div>
            <span class="split-rank-chip ${src}">${rl}</span>
            <div class="split-name">${ag.name}</div>
            ${ag.role||ag.title?`<div class="split-role">${ag.role||ag.title}</div>`:''}
            ${ag.comment?`<div class="split-quote">"${ag.comment}"</div>`:''}
            ${pills?`<div class="split-pills">${pills}</div>`:''}
          </div>
          <div class="rest-col">
            ${rest?`<div class="rest-label">Leaderboard</div>`:''}
            ${rest}
          </div>
        </div>`;
    }

    arena.insertBefore(el, document.getElementById('progress'));
    slideEls.push(el);
  });

  buildDots(list);
}

// ── Dots ───────────────────────────────────────
function buildDots(list){
  const bar=document.getElementById('dotsbar');
  bar.innerHTML='';
  list.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.addEventListener('click',()=>goTo(i,true));
    bar.appendChild(d);
  });
}

// ── Go to slide ────────────────────────────────
function goTo(idx,manual=false){
  if(!slideEls.length) return;
  idx=((idx%slideEls.length)+slideEls.length)%slideEls.length;

  if(slideEls[cur]){ slideEls[cur].classList.remove('active'); slideEls[cur].classList.add('exit'); }
  const old=cur; cur=idx;

  const willCelebrate = !manual && +agents[cur]?.rank===1 && old!==0;

  if(willCelebrate){
    showCeleb(agents[cur]);
    setTimeout(()=>activateSlide(), CELEB_MS);
  } else {
    activateSlide();
  }
  startProg();
  syncDots();
}
function activateSlide(){
  slideEls.forEach((s,i)=>{ s.classList.remove('active','exit'); if(i===cur) s.classList.add('active'); });
}
function syncDots(){
  document.querySelectorAll('#dotsbar .dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
}

// ── Auto advance ───────────────────────────────
function startAuto(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{ goTo(cur+1); startAuto(); }, SLIDE_MS);
}
function resetAuto(){ clearTimeout(autoTimer); startAuto(); }

// ── Progress ───────────────────────────────────
function startProg(){
  clearInterval(progTimer);
  const fill=document.getElementById('progress-fill');
  fill.style.width='0%';
  const t0=Date.now();
  progTimer=setInterval(()=>{
    const p=Math.min(100,(Date.now()-t0)/SLIDE_MS*100);
    fill.style.width=p+'%';
    if(p>=100){ clearInterval(progTimer); goTo(cur+1); startAuto(); }
  },60);
}

// ── Celebration + Confetti ────────────────────
function showCeleb(agent){
  document.getElementById('celeb-name').textContent=agent.name;
  document.getElementById('celeb-label').textContent=
    `#1 · ${agent.role||agent.title||'Top Performer'} · ${document.getElementById('tb-month').textContent.replace('⭐ ','')}`;
  const box=document.getElementById('celeb-box');
  box.classList.remove('out');
  document.getElementById('celeb').classList.add('show');
  launchConfetti();
  setTimeout(()=>{
    box.classList.add('out');
    setTimeout(()=>{ document.getElementById('celeb').classList.remove('show'); stopConfetti(); },450);
  }, CELEB_MS-500);
}
function launchConfetti(){
  const cvs=document.getElementById('confetti-canvas');
  const ctx=cvs.getContext('2d');
  cvs.width=window.innerWidth; cvs.height=window.innerHeight;
  const cols=['#1D4ED8','#6D28D9','#B45309','#047857','#EC4899','#F59E0B','#fff'];
  const bits=Array.from({length:140},()=>({
    x:Math.random()*cvs.width, y:Math.random()*-cvs.height,
    w:6+Math.random()*8, h:4+Math.random()*4,
    c:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-.5)*3.5, vy:2.5+Math.random()*3.5,
    r:Math.random()*Math.PI*2, vr:(Math.random()-.5)*.15,
  }));
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    bits.forEach(b=>{
      ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.r);
      ctx.fillStyle=b.c; ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h); ctx.restore();
      b.x+=b.vx; b.y+=b.vy; b.r+=b.vr;
      if(b.y>cvs.height){ b.y=-20; b.x=Math.random()*cvs.width; }
    });
    confAnim=requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti(){
  cancelAnimationFrame(confAnim);
  const c=document.getElementById('confetti-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ── Music ──────────────────────────────────────
document.getElementById('mus-btn').addEventListener('click',()=>{
  const a=document.getElementById('bgaudio');
  const bars=document.getElementById('mus-bars');
  const btn=document.getElementById('mus-btn');
  const st=document.getElementById('mus-state');
  if(!a.src||a.src===location.href) return;
  if(isPlaying){ a.pause(); btn.textContent='▶'; bars.classList.add('off'); st.textContent='Paused'; }
  else { a.play().catch(()=>{}); btn.textContent='⏸'; bars.classList.remove('off'); st.textContent='Now playing'; }
  isPlaying=!isPlaying;
});

// ── Keyboard + Touch ───────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') { goTo(cur+1,true); resetAuto(); }
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   { goTo(cur-1,true); resetAuto(); }
});
let tx=0;
document.getElementById('arena').addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.getElementById('arena').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50){ goTo(dx<0?cur+1:cur-1,true); resetAuto(); }
});

// ── Render ─────────────────────────────────────
function render({s,a}){
  agents=a;
  document.getElementById('tb-month').textContent=`⭐ ${s.month}`;
  document.getElementById('tb-name').textContent=s.company||'In-Call Outsourcing';
  document.getElementById('tb-time').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  if(s.logo&&s.logo.startsWith('http')){
    document.getElementById('tb-logo').src=s.logo;
  }
  if(s.music_url&&s.music_url.startsWith('http')){
    const aud=document.getElementById('bgaudio');
    if(aud.src!==s.music_url) aud.src=s.music_url;
    document.getElementById('mus-title').textContent=s.music_name;
    document.getElementById('music').style.display='flex';
  }

  buildSlides(a);
  setTimeout(()=>{ activateSlide(); syncDots(); },60);
  startProg();
  startAuto();
}

// ── Init ───────────────────────────────────────
async function main(){
  try {
    const data=await loadData();
    render(data);
  } catch(e){
    render({s:DEMO.s,a:DEMO.a});
  } finally {
    setTimeout(()=>document.getElementById('loading').classList.add('hide'),1800);
  }
}
main();
setInterval(async()=>{
  try{
    const d=await loadData();
    document.getElementById('tb-time').textContent='Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    if(JSON.stringify(d.a)!==JSON.stringify(agents)) render(d);
  }catch(e){}
},60000);
</script>
</body>
</html>
