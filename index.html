<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honor Board — In-Call Outsourcing</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%234F46E5'/%3E%3Cstop offset='100%25' stop-color='%23F59E0B'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M12 44 L20 20 L32 36 L44 16 L56 44 Z' fill='%23FCD34D' stroke='%23fff' stroke-width='1.5' stroke-linejoin='round'/%3E%3Crect x='10' y='44' width='44' height='8' rx='4' fill='%23FCD34D'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4FF;--bg2:#E8EEFF;--surface:rgba(255,255,255,.92);--surface2:rgba(240,244,255,.85);
  --border:rgba(99,102,241,.12);--border2:rgba(99,102,241,.22);
  --text:#0F1133;--muted:#5A6490;--faint:#9BA3CC;
  --indigo:#4F46E5;--indigo2:#818CF8;--indigo-g:rgba(79,70,229,.18);--indigo-s:rgba(79,70,229,.08);
  --gold:#D97706;--gold2:#F59E0B;--gold3:#FCD34D;--gold-g:rgba(217,119,6,.2);--gold-s:rgba(217,119,6,.08);
  --teal:#0D9488;--teal2:#2DD4BF;--teal-g:rgba(13,148,136,.2);--teal-s:rgba(13,148,136,.08);
  --sky:#0284C7;--sky2:#38BDF8;--sky-s:rgba(2,132,199,.08);
  --violet:#7C3AED;--violet2:#A78BFA;--violet-g:rgba(124,58,237,.18);--violet-s:rgba(124,58,237,.08);
  --rose2:#FB7185;--silver:#64748B;--silver2:#94A3B8;--bronze:#92400E;--bronze2:#B45309;
  --font-display:'Cinzel',serif;--font:'Outfit',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* BACKGROUND CANVAS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}



#loading{position:fixed;inset:0;z-index:9999;background:#F0F4FF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .8s,visibility .8s;}
#loading.hide{opacity:0;visibility:hidden;pointer-events:none;}
.ld-scene{position:relative;width:110px;height:110px;}
.ld-r1{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--gold2);border-right-color:rgba(245,158,11,.25);animation:spin 1.4s linear infinite;filter:drop-shadow(0 0 5px var(--gold-g));}
.ld-r2{position:absolute;inset:13px;border-radius:50%;border:2px solid transparent;border-bottom-color:var(--indigo);border-left-color:rgba(79,70,229,.25);animation:spin 2.1s linear infinite reverse;filter:drop-shadow(0 0 5px var(--indigo-g));}
.ld-r3{position:absolute;inset:25px;border-radius:50%;border:1.5px solid var(--teal-g);animation:spin 3s linear infinite;}
.ld-core{position:absolute;inset:34px;border-radius:50%;background:#ffffff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 0 1px var(--border2),0 4px 20px rgba(79,70,229,.12);}
.ld-core img{width:34px;height:34px;object-fit:contain;}
.ld-label{font-family:var(--font-display);font-size:.6rem;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--indigo);animation:lbPulse 2s ease infinite;}
@keyframes lbPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

#topbar{position:relative;z-index:50;flex-shrink:0;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(255,255,255,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);box-shadow:0 1px 0 var(--border),0 4px 24px rgba(99,102,241,.07);}
#topbar::after{content:'';position:absolute;bottom:-1px;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,var(--indigo),var(--gold2),var(--indigo),transparent);opacity:.4;}
.tb-l{display:flex;align-items:center;gap:12px;}
.tb-logo-wrap{width:42px;height:42px;border-radius:11px;overflow:hidden;border:1.5px solid var(--border2);background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(79,70,229,.1);}
.tb-logo-wrap img{width:40px;height:40px;object-fit:contain;}
.tb-co{font-size:.9rem;font-weight:700;color:var(--text);}
.tb-tag{font-size:.56rem;color:var(--faint);margin-top:1px;}
.tb-c{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.tb-honor{font-family:var(--font-display);font-size:1.08rem;font-weight:700;letter-spacing:.1em;background:linear-gradient(135deg,var(--indigo) 0%,var(--gold2) 50%,var(--indigo) 100%);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hGrad 6s ease infinite;}
@keyframes hGrad{0%,100%{background-position:0%}50%{background-position:100%}}
.tb-dept{font-size:.58rem;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-top:2px;}
.tb-r{opacity:0;pointer-events:none;}
.live-d{width:5px;height:5px;border-radius:50%;background:#10B981;animation:blink 1.8s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

#arena{flex:1;position:relative;overflow:hidden;z-index:2;}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px 36px;opacity:0;transform:translateY(18px) scale(.97);transition:opacity .65s cubic-bezier(.4,0,.2,1),transform .65s cubic-bezier(.34,1.15,.64,1);pointer-events:none;}
.slide.active{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.slide.exit{opacity:0;transform:translateY(-18px) scale(.97);}

.dept-header{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.dept-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.dept-chip{font-family:var(--font-display);font-size:.58rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:6px 20px;border-radius:100px;background:linear-gradient(135deg,rgba(79,70,229,.18),rgba(217,119,6,.12));color:var(--indigo);border:1px solid var(--border2);box-shadow:0 2px 12px rgba(79,70,229,.1),inset 0 1px 0 rgba(255,255,255,.8);white-space:nowrap;}

.layout-2{display:flex;width:100%;max-width:1040px;flex-direction:column;}
.row-2{display:grid;grid-template-columns:1.42fr 1fr;gap:20px;align-items:start;}
.layout-3{display:flex;width:100%;max-width:1100px;flex-direction:column;}
.row-3{display:grid;grid-template-columns:1.45fr 1fr 1fr;gap:18px;align-items:start;}

/* Cards get glass effect so scene shows through subtly */
.hero-card{
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(20px);
  border-radius:24px;border:1.5px solid var(--border2);
  box-shadow:0 4px 6px rgba(79,70,229,.04),0 12px 40px rgba(79,70,229,.08),inset 0 1px 0 rgba(255,255,255,.9);
  padding:28px 24px;display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;
  animation:cardIn .75s cubic-bezier(.34,1.3,.64,1) both;
  transition:transform .3s,box-shadow .3s;
}
.hero-card:hover{transform:translateY(-5px);box-shadow:0 8px 12px rgba(79,70,229,.06),0 24px 60px rgba(79,70,229,.14),0 0 0 1.5px var(--indigo-g);}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--indigo),var(--gold2),var(--teal),var(--indigo));background-size:200%;animation:barGrad 5s ease infinite;border-radius:24px 24px 0 0;}
@keyframes barGrad{0%,100%{background-position:0%}50%{background-position:100%}}
.hero-card::after{content:'';position:absolute;inset:0;border-radius:24px;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(79,70,229,.04),transparent 60%);}

.hero-photo-frame{width:175px;height:175px;border-radius:50%;position:relative;margin-bottom:18px;}
.hpf-ring{position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--indigo) 0deg,var(--gold2) 72deg,var(--teal) 144deg,var(--violet) 216deg,var(--rose2) 288deg,var(--indigo) 360deg);animation:spin 10s linear infinite;z-index:0;filter:blur(.5px);}
.hpf-inner{position:absolute;inset:5px;border-radius:50%;z-index:1;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #fff,0 4px 20px rgba(79,70,229,.1);}
.hpf-inner img{width:100%;height:100%;object-fit:cover;}
.hero-initials{font-family:var(--font-display);font-size:3.6rem;font-weight:700;background:linear-gradient(135deg,var(--indigo),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.rank-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:.54rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.rt-gold  {background:var(--gold-s);color:var(--gold);border:1px solid rgba(217,119,6,.25);}
.rt-silver{background:rgba(100,116,139,.07);color:var(--silver);border:1px solid rgba(100,116,139,.2);}
.rt-bronze{background:rgba(180,83,9,.07);color:var(--bronze2);border:1px solid rgba(180,83,9,.2);}
.rt-blue  {background:var(--sky-s);color:var(--sky);border:1px solid rgba(2,132,199,.2);}
.rank-dot{width:5px;height:5px;border-radius:50%;}
.rt-gold .rank-dot{background:var(--gold2);box-shadow:0 0 4px var(--gold-g);}
.rt-silver .rank-dot{background:var(--silver2);}
.rt-bronze .rank-dot{background:var(--bronze2);}
.rt-blue .rank-dot{background:var(--sky2);}

.hero-name{font-family:var(--font-display);font-size:clamp(1.4rem,2.4vw,2rem);font-weight:700;text-align:center;line-height:1.1;color:var(--text);margin-bottom:5px;}
.hero-role{font-size:.7rem;color:var(--muted);font-weight:500;background:rgba(240,244,255,.9);border:1px solid var(--border2);padding:3px 12px;border-radius:8px;margin-bottom:16px;}
.hero-quote{font-size:.8rem;font-weight:300;color:var(--muted);font-style:italic;line-height:1.75;border-left:2px solid var(--indigo);padding-left:14px;margin-bottom:18px;text-align:left;width:100%;}
.hero-metrics{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;}
.mcard{flex:1;min-width:76px;background:rgba(240,244,255,.85);border:1.5px solid var(--border2);border-radius:14px;padding:12px 14px;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s;}
.mcard:hover{transform:translateY(-3px);}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.mc-s::before{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.mc-s:hover{box-shadow:0 6px 20px var(--teal-g);}
.mc-d::before{background:linear-gradient(90deg,var(--indigo),var(--indigo2));}
.mc-d:hover{box-shadow:0 6px 20px var(--indigo-g);}
.mc-t::before{background:linear-gradient(90deg,var(--violet),var(--violet2));}
.mc-t:hover{box-shadow:0 6px 20px var(--violet-g);}
.mcard-label{font-size:.5rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;}
.mcard-val{font-family:var(--font-display);font-size:1.4rem;font-weight:700;line-height:1;}
.mc-s .mcard-val{color:var(--teal);}
.mc-d .mcard-val{color:var(--indigo);}
.mc-t .mcard-val{color:var(--violet);}

.compact-card{
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(20px);
  border-radius:18px;border:1.5px solid var(--border);
  box-shadow:0 2px 4px rgba(79,70,229,.04),0 8px 28px rgba(79,70,229,.06);
  padding:20px;display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden;
  animation:cardIn .75s cubic-bezier(.34,1.3,.64,1) both;
  transition:transform .25s,box-shadow .25s;
}
.compact-card:hover{transform:translateY(-3px);box-shadow:0 6px 8px rgba(79,70,229,.06),0 16px 40px rgba(79,70,229,.1);}
.compact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.cc-silver::before{background:linear-gradient(90deg,var(--silver),var(--silver2));}
.cc-bronze::before{background:linear-gradient(90deg,var(--bronze),var(--bronze2));}
.cc-4::before{background:linear-gradient(90deg,var(--sky),var(--sky2));}
.cc-5::before{background:linear-gradient(90deg,var(--violet),var(--violet2));}
.cc-top{display:flex;align-items:center;gap:13px;}
.cc-avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;background:rgba(240,244,255,.9);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.9rem;font-weight:700;color:var(--indigo);overflow:hidden;border:2px solid var(--border2);}
.cc-silver .cc-avatar{color:var(--silver);border-color:rgba(100,116,139,.2);}
.cc-bronze .cc-avatar{color:var(--bronze2);border-color:rgba(180,83,9,.2);}
.cc-avatar img{width:100%;height:100%;object-fit:cover;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-family:var(--font-display);font-size:.98rem;font-weight:700;color:var(--text);line-height:1.2;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-role{font-size:.6rem;color:var(--muted);font-weight:500;margin-top:2px;}
.cc-metrics{display:flex;gap:8px;flex-wrap:wrap;}
.cc-pill{flex:1;min-width:64px;background:rgba(240,244,255,.85);border:1.5px solid var(--border2);border-radius:12px;padding:10px 12px;}
.cc-pill-label{font-size:.48rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
.cc-pill-val{font-family:var(--font-display);font-size:1.15rem;font-weight:700;line-height:1;}
.ccp-s .cc-pill-val{color:var(--teal);}
.ccp-d .cc-pill-val{color:var(--indigo);}
.ccp-t .cc-pill-val{color:var(--violet);}

@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.hero-card{animation-delay:.04s;}
.compact-card:nth-of-type(1){animation-delay:.16s;}
.compact-card:nth-of-type(2){animation-delay:.28s;}

#prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(79,70,229,.06);z-index:20;}
#prog-fill{height:100%;width:0%;border-radius:0 3px 3px 0;background:linear-gradient(90deg,var(--indigo),var(--gold2),var(--teal),var(--indigo));background-size:300%;animation:pgShimmer 4s linear infinite;}
@keyframes pgShimmer{0%{background-position:0%}100%{background-position:300%}}

#dots{flex-shrink:0;height:44px;z-index:10;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-top:1px solid var(--border2);}
.dot{width:6px;height:6px;border-radius:100px;background:var(--faint);cursor:pointer;transition:background .3s,width .4s cubic-bezier(.34,1.3,.64,1),box-shadow .3s;}
.dot.on{background:linear-gradient(90deg,var(--indigo),var(--gold2));width:26px;box-shadow:0 0 10px rgba(79,70,229,.3);}

#celeb{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;background:rgba(15,17,51,.5);backdrop-filter:blur(14px);}
#celeb.show{display:flex;}
#confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.celeb-card{position:relative;z-index:2;background:rgba(12,16,34,.95);border-radius:28px;padding:52px 68px;text-align:center;border:1.5px solid var(--border2);box-shadow:0 0 0 6px rgba(79,70,229,.06),0 40px 100px rgba(15,17,51,.22),inset 0 1px 0 #fff;animation:celebIn .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes celebIn{from{opacity:0;transform:scale(.5) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}
.celeb-card.out{animation:celebOut .4s ease both;}
@keyframes celebOut{to{opacity:0;transform:scale(.87)}}
.celeb-ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.celeb-orn-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--indigo));}
.celeb-orn-line.r{background:linear-gradient(90deg,var(--indigo),transparent);}
.celeb-orn-diamond{width:8px;height:8px;background:var(--gold2);transform:rotate(45deg);box-shadow:0 0 10px var(--gold-g);}
.celeb-dept{font-family:var(--font-display);font-size:.56rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--indigo);margin-bottom:12px;opacity:.7;}
.celeb-name{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;background:linear-gradient(135deg,var(--indigo),var(--gold2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.05;}
.celeb-label{font-size:.78rem;color:var(--muted);font-weight:400;margin-top:10px;letter-spacing:.05em;}

#announce{position:fixed;inset:0;z-index:700;display:none;align-items:flex-end;justify-content:center;pointer-events:none;padding-bottom:52px;}
#announce.show{display:flex;}
.ann-box{background:rgba(255,255,255,.96);color:var(--text);border:1.5px solid var(--border2);border-radius:16px;padding:16px 28px;font-size:.95rem;font-weight:600;box-shadow:0 0 0 4px rgba(79,70,229,.06),0 16px 48px rgba(79,70,229,.14);animation:annIn .5s cubic-bezier(.34,1.56,.64,1) both;max-width:560px;text-align:center;line-height:1.5;}
@keyframes annIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
.ann-box.out{animation:annOut .35s ease both;}
@keyframes annOut{to{opacity:0;transform:translateY(26px)}}

#music{position:fixed;bottom:52px;right:22px;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border:1.5px solid var(--border2);border-radius:14px;padding:10px 14px;display:none;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(79,70,229,.1);min-width:185px;}
.mus-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--indigo-s);color:var(--indigo);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:background .2s,color .2s;flex-shrink:0;}
.mus-btn:hover{background:var(--indigo);color:#fff;}
.mus-info{flex:1;min-width:0;}
.mus-t{font-size:.68rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.mus-s{font-size:.56rem;color:var(--faint);margin-top:1px;}
.mus-bars{display:flex;align-items:flex-end;gap:2px;height:12px;}
.mb{width:3px;border-radius:2px;background:var(--indigo);animation:mba .8s ease-in-out infinite alternate;}
.mb:nth-child(1){height:5px;animation-delay:0s}.mb:nth-child(2){height:10px;animation-delay:.14s}.mb:nth-child(3){height:6px;animation-delay:.28s}.mb:nth-child(4){height:11px;animation-delay:.07s}.mb:nth-child(5){height:4px;animation-delay:.21s}
@keyframes mba{from{transform:scaleY(.2)}to{transform:scaleY(1)}}
.mus-bars.off .mb{animation-play-state:paused;}

#errbanner{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(254,242,242,.95);border:1px solid rgba(248,113,113,.35);color:#DC2626;padding:6px 16px;border-radius:10px;font-size:.7rem;display:none;z-index:200;white-space:nowrap;backdrop-filter:blur(8px);}
#errbanner.show{display:block;}

@media(max-width:860px){.row-2,.row-3{grid-template-columns:1fr;}.slide{padding:14px 16px;}#topbar{padding:0 18px;}.tb-c{display:none;}.hero-photo-frame{width:130px;height:130px;}}
</style>
</head>
<body>

function buildDots(){
  const bar=document.getElementById('dots'); bar.innerHTML='';
  const labels=['SR Chaser','Chaser','Opener-Closer','Opener'];
  slideEls.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.title=labels[i]||`#${i+1}`;
    d.addEventListener('click',()=>{goTo(i,true);resetAuto();});
    bar.appendChild(d);
  });
}

function goTo(idx,manual=false){
  if(!slideEls.length)return;
  idx=((idx%slideEls.length)+slideEls.length)%slideEls.length;
  if(slideEls[cur]){slideEls[cur].classList.remove('active');slideEls[cur].classList.add('exit');}
  const prev=cur; cur=idx;
  const fire=!manual && cur===0 && prev!==0;
  if(fire){showCeleb(); setTimeout(activate,CELEB_MS);}
  else setTimeout(activate,50);
  startProg();
  document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
}
function activate(){
  slideEls.forEach((s,i)=>{s.classList.remove('active','exit');if(i===cur)s.classList.add('active');});
}
function startAuto(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{goTo(cur+1);startAuto();},SLIDE_MS);
}
function resetAuto(){clearTimeout(autoTimer);startAuto();}

  progTimer=setInterval(()=>{
    const p=Math.min(100,(Date.now()-t0)/SLIDE_MS*100);
    fill.style.width=p+'%';
    if(p>=100){clearInterval(progTimer);goTo(cur+1);startAuto();}

function checkAnnouncement(d){
  const msg=get(d,'message');
  if(msg && msg!==lastMsg){
    lastMsg=msg;
    showAnnouncement(msg);
  }
}
function showAnnouncement(msg){
  const ann=document.getElementById('announce');
  const box=document.getElementById('ann-box');
  box.classList.remove('out');
  box.textContent=msg;
  ann.classList.add('show');
  // play a chime
  playChime();
  setTimeout(()=>{
    box.classList.add('out');
    setTimeout(()=>ann.classList.remove('show'),400);
  },ANN_MS-400);
}
function playChime(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [880,1100,1320].forEach((f,i)=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      osc.connect(gain);gain.connect(ctx.destination);
      osc.frequency.value=f;osc.type='sine';
      gain.gain.setValueAtTime(0,ctx.currentTime+i*.18);
      gain.gain.linearRampToValueAtTime(.22,ctx.currentTime+i*.18+.04);
      gain.gain.linearRampToValueAtTime(0,ctx.currentTime+i*.18+.6);
      osc.start(ctx.currentTime+i*.18);
      osc.stop(ctx.currentTime+i*.18+.7);
    });
  }catch(e){}
}

/* ══════════════════════════════════════════
   CONFETTI
══════════════════════════════════════════ */
function launchConfetti(){
  const cvs=document.getElementById('confetti');
  const ctx=cvs.getContext('2d');
  cvs.width=window.innerWidth;cvs.height=window.innerHeight;
  const cols=['#1E40AF','#92400E','#D97706','#065F46','#4C1D95','#9F1239','#fff','#FBBF24'];
  const bits=Array.from({length:160},()=>({
    x:Math.random()*cvs.width,y:Math.random()*-cvs.height,
    w:5+Math.random()*9,h:3+Math.random()*5,
    c:cols[Math.floor(Math.random()*cols.length)],
    vx:(Math.random()-.5)*3.5,vy:2+Math.random()*4,
    r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.14,
  }));
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    bits.forEach(b=>{
      ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.r);
      ctx.fillStyle=b.c;ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);ctx.restore();
      b.x+=b.vx;b.y+=b.vy;b.r+=b.vr;
      if(b.y>cvs.height){b.y=-20;b.x=Math.random()*cvs.width;}
    });
    confAnim=requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti(){
  cancelAnimationFrame(confAnim);
  const c=document.getElementById('confetti');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

/* ══════════════════════════════════════════
   DARK NETWORK + GLOWING HEAD SCENE
   Inspired by the reference image
══════════════════════════════════════════ */
(function(){
  /* ── Setup two canvases ──
     bg-canvas  = dark bg + network nodes (behind everything)
     head-canvas = glowing wireframe head (right side)
  ─────────────────────────────────────── */
  const bgCvs  = document.getElementById('bg-canvas');
  const bgCtx  = bgCvs.getContext('2d');

  // Create a second canvas for the head (overlay, right side)
  const hCvs = document.createElement('canvas');
  hCvs.style.cssText = 'position:fixed;inset:0;z-index:1;pointer-events:none;';
  document.body.appendChild(hCvs);
  const hCtx = hCvs.getContext('2d');

  let W, H, t = 0;

  function resize(){
    W = bgCvs.width  = hCvs.width  = window.innerWidth;
    H = bgCvs.height = hCvs.height = window.innerHeight;
    buildHead();
  }

  /* ══════════════════════════════════
     NETWORK NODES
  ══════════════════════════════════ */
  const NODE_COUNT = 70;
  const COLS = [
    [255,80,100],   // hot red
    [255,130,50],   // orange
    [255,200,80],   // yellow
    [120,180,255],  // sky blue
    [200,130,255],  // violet
    [80,220,200],   // teal
    [255,255,255],  // white
  ];

  let nodes = [];
  function buildNodes(){
    nodes = Array.from({length:NODE_COUNT},(_,i)=>({
      x: Math.random(),
      y: Math.random()*.85 + .05,
      vx:(Math.random()-.5)*.00035,
      vy:(Math.random()-.5)*.00022,
      r: 1.5 + Math.random()*6,
      col: COLS[Math.floor(Math.random()*COLS.length)],
      pulse: Math.random()*Math.PI*2,
      ps: 0.012 + Math.random()*.018,
      glow: Math.random() > .6,
    }));
  }

  /* ══════════════════════════════════
     WIREFRAME HEAD (right side)
  ══════════════════════════════════ */
  let headVerts = [], headEdges = [];
  let headRot = 0;

  function buildHead(){
    headVerts = [];
    headEdges = [];

    /* Generate a stylised head silhouette as 3D points.
       We build it in normalised coords (-1..1) then project. */
    const profile = [
      // back of skull
      [-.55, .9,0],[-.65, .5,0],[-.62,-.1,0],[-.52,-.6,0],[-.35,-.9,0],
      // chin
      [-.1,-1.05,0],[.0,-1.1,0],[.1,-1.05,0],
      // jaw to cheek
      [.35,-.9,0],[.52,-.6,0],[.58,-.1,0],
      // nose bridge area
      [.62,.1,0],[.65,.4,0],
      // forehead
      [.6,.75,0],[.45,1.0,0],[.2,1.1,0],[-.2,1.1,0],[-.45,1.0,0],
    ];

    // Front face ring (z=0.3, slightly forward)
    const face = [
      [-.3, .75,.3],[-.4, .3,.3],[-.38,-.15,.3],[-.3,-.55,.3],
      [-.1,-.82,.3],[.0,-.88,.3],[.1,-.82,.3],[.3,-.55,.3],
      [.38,-.15,.3],[.4, .3,.3],[.35, .75,.3],[.15, .95,.3],[-.15, .95,.3],
    ];

    // Side depth rings (vary z to simulate depth)
    const rings = [0, 0.15, 0.3, 0.45, 0.6];
    rings.forEach((z,ri)=>{
      const scale = 1 - z*.35;
      profile.forEach(([px,py],i)=>{
        headVerts.push([px*scale, py*scale, z - 0.3]);
      });
    });

    // Face vertices
    face.forEach(v=>headVerts.push(v));

    // Build edges: connect ring-to-ring and within rings
    const PL = profile.length;
    rings.forEach((z,ri)=>{
      const base = ri*PL;
      for(let i=0;i<PL;i++){
        // Within ring
        headEdges.push([base+i, base+(i+1)%PL]);
        // To next ring
        if(ri<rings.length-1) headEdges.push([base+i, base+PL+i]);
      }
    });

    // Connect last ring to face verts
    const fBase = rings.length*PL;
    face.forEach((_,i)=>{
      headEdges.push([fBase+i, fBase+(i+1)%face.length]);
      // connect to nearest profile point on last ring
      const lastRingBase = (rings.length-1)*PL;
      const nearest = Math.round(i/face.length*(PL-1));
      headEdges.push([fBase+i, lastRingBase+nearest]);
    });
  }

  function projectHead(v, cx, cy, rot, tilt, scale){
    const [x,y,z] = v;
    // Rotate around Y axis
    const rx = x*Math.cos(rot) - z*Math.sin(rot);
    const rz = x*Math.sin(rot) + z*Math.cos(rot);
    // Tilt around X
    const ry2 = y*Math.cos(tilt) - rz*Math.sin(tilt);
    const rz2 = y*Math.sin(tilt) + rz*Math.cos(tilt);
    // Perspective
    const fov = 2.2;
    const pz  = rz2 + fov;
    const sx  = (rx/pz)*scale + cx;
    const sy  = (ry2/pz)*scale + cy;
    return { sx, sy, depth: rz2 };
  }

  function drawHead(){
    hCtx.clearRect(0,0,W,H);
    if(!headVerts.length) return;

    const cx   = W*0.78;
    const cy   = H*0.52;
    const sc   = Math.min(W,H)*0.28;
    const rot  = headRot;
    const tilt = Math.sin(t*0.004)*0.06;

    // Project all verts
    const proj = headVerts.map(v=>projectHead(v,cx,cy,rot,tilt,sc));

    // Glow layers — draw edges with depth-based color
    const maxDepth = 0.8, minDepth = -0.8;

    headEdges.forEach(([ai,bi])=>{
      if(ai>=proj.length||bi>=proj.length) return;
      const pa = proj[ai], pb = proj[bi];
      const avgD = (pa.depth+pb.depth)/2;
      const norm = (avgD-minDepth)/(maxDepth-minDepth); // 0..1

      // Color: deep = cool blue/purple, front = hot red/orange
      const r = Math.round(80  + norm*175);
      const g = Math.round(60  + norm*60);
      const b = Math.round(200 - norm*100);
      const a = 0.08 + norm*0.35;

      // Outer glow pass
      hCtx.save();
      hCtx.strokeStyle = `rgba(${r+40},${g+20},${b},${a*0.4})`;
      hCtx.lineWidth   = 3.5;
      hCtx.shadowColor = `rgba(${r},${g},${b},0.6)`;
      hCtx.shadowBlur  = 14;
      hCtx.beginPath();
      hCtx.moveTo(pa.sx,pa.sy);
      hCtx.lineTo(pb.sx,pb.sy);
      hCtx.stroke();
      hCtx.restore();

      // Core line
      hCtx.save();
      hCtx.strokeStyle = `rgba(${r},${g},${b},${a})`;
      hCtx.lineWidth   = 0.8;
      hCtx.beginPath();
      hCtx.moveTo(pa.sx,pa.sy);
      hCtx.lineTo(pb.sx,pb.sy);
      hCtx.stroke();
      hCtx.restore();
    });

    // Vertex dots (hot spots)
    proj.forEach((p,i)=>{
      if(i%3!==0) return; // thin out
      const norm = (p.depth-minDepth)/(maxDepth-minDepth);
      const r = 80+norm*175, g=60+norm*60, b=200-norm*100;
      hCtx.save();
      hCtx.shadowColor = `rgba(${r},${g},${b},0.9)`;
      hCtx.shadowBlur  = 12;
      hCtx.fillStyle   = `rgba(${r},${g},${b},${0.3+norm*0.5})`;
      hCtx.beginPath();
      hCtx.arc(p.sx,p.sy, 1.2+norm*2, 0, Math.PI*2);
      hCtx.fill();
      hCtx.restore();
    });

    // Brain glow (warm pulsing sphere behind head)
    const gPulse = 0.6 + Math.sin(t*0.022)*0.4;
    const grd = hCtx.createRadialGradient(cx+sc*.08,cy-sc*.08,0, cx+sc*.08,cy-sc*.08,sc*.6);
    grd.addColorStop(0,  `rgba(220,100,100,${0.09*gPulse})`);
    grd.addColorStop(0.4,`rgba(255,130,60,${0.055*gPulse})`);
    grd.addColorStop(1,  'rgba(0,0,0,0)');
    hCtx.fillStyle = grd;
    hCtx.beginPath();
    hCtx.ellipse(cx+sc*.08,cy-sc*.08, sc*.65,sc*.75,0,0,Math.PI*2);
    hCtx.fill();
  }

  /* ══════════════════════════════════
     DARK BG + NETWORK DRAW LOOP
  ══════════════════════════════════ */
  function drawBG(){
    // Dark gradient background
    bgCtx.clearRect(0,0,W,H);

    const bgGrad = bgCtx.createRadialGradient(W*.3,H*.4,0, W*.5,H*.5,Math.max(W,H)*.9);
    bgGrad.addColorStop(0,  '#EEF2FF');
    bgGrad.addColorStop(0.45,'#E8EEFF');
    bgGrad.addColorStop(1,  '#DDE4FF');
    bgCtx.fillStyle = bgGrad;
    bgCtx.fillRect(0,0,W,H);

    // Atmospheric glow patches
    const glows = [
      [W*.15, H*.35, W*.38, 'rgba(99,102,241,.07)'],
      [W*.78, H*.28, W*.30, 'rgba(245,158,11,.05)'],
      [W*.5,  H*.85, W*.40, 'rgba(13,148,136,.05)'],
    ];
    glows.forEach(([gx,gy,gr,col])=>{
      const g2 = bgCtx.createRadialGradient(gx,gy,0,gx,gy,gr);
      g2.addColorStop(0,col); g2.addColorStop(1,'rgba(0,0,0,0)');
      bgCtx.fillStyle=g2; bgCtx.fillRect(0,0,W,H);
    });

    // Update + draw nodes
    nodes.forEach(n=>{
      n.x += n.vx; n.y += n.vy;
      if(n.x<0)n.x=1; if(n.x>1)n.x=0;
      if(n.y<0.02)n.y=.98; if(n.y>.98)n.y=.02;
      n.pulse += n.ps;
    });

    // Connections
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i], b=nodes[j];
        const dx=(a.x-b.x)*W, dy=(a.y-b.y)*H;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const maxDist=180;
        if(dist<maxDist){
          const alpha=(1-dist/maxDist)*.25;
          // Gradient line between node colors
          const gline=bgCtx.createLinearGradient(a.x*W,a.y*H,b.x*W,b.y*H);
          gline.addColorStop(0,`rgba(${a.col[0]},${a.col[1]},${a.col[2]},${alpha})`);
          gline.addColorStop(1,`rgba(${b.col[0]},${b.col[1]},${b.col[2]},${alpha})`);
          bgCtx.beginPath();
          bgCtx.strokeStyle=gline;
          bgCtx.lineWidth=.7;
          bgCtx.moveTo(a.x*W,a.y*H);
          bgCtx.lineTo(b.x*W,b.y*H);
          bgCtx.stroke();
        }
      }
    }

    // Node dots
    nodes.forEach(n=>{
      const pulse = .7+Math.sin(n.pulse)*.3;
      const r=n.col[0], g=n.col[1], b=n.col[2];
      const nr=n.r*pulse;

      if(n.glow){
        bgCtx.save();
        bgCtx.shadowColor=`rgb(${r},${g},${b})`;
        bgCtx.shadowBlur=nr*4;
        bgCtx.fillStyle=`rgba(${r},${g},${b},.85)`;
        bgCtx.beginPath();
        bgCtx.arc(n.x*W,n.y*H,nr*.7,0,Math.PI*2);
        bgCtx.fill();
        bgCtx.restore();
      }

      bgCtx.fillStyle=`rgba(${r},${g},${b},${.35+pulse*.3})`;
      bgCtx.beginPath();
      bgCtx.arc(n.x*W,n.y*H,nr,0,Math.PI*2);
      bgCtx.fill();

      // Inner highlight
      bgCtx.fillStyle=`rgba(255,255,255,.35)`;
      bgCtx.beginPath();
      bgCtx.arc(n.x*W-nr*.2,n.y*H-nr*.2,nr*.3,0,Math.PI*2);
      bgCtx.fill();
    });
  }

  /* ══════════════════════════════════
     MAIN LOOP
  ══════════════════════════════════ */
  function loop(){
    t++;
    headRot = Math.sin(t*0.006)*0.35 + 0.1; // gentle head sway

    drawBG();
    drawHead();
    requestAnimationFrame(loop);
  }

  resize();
  buildNodes();
  loop();
  window.addEventListener('resize',()=>{resize();buildNodes();});
})();
</script>
</body>
</html>
