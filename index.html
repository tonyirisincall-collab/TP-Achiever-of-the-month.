<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honor Board — In-Call Outsourcing</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234F46E5'/%3E%3Cstop offset='100%25' stop-color='%237C3AED'/%3E%3C/linearGradient%3E%3ClinearGradient id='gold' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%23FCD34D'/%3E%3Cstop offset='100%25' stop-color='%23D97706'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='46' font-family='Georgia%2C serif' font-size='48' font-weight='900' fill='url(%23gold)' text-anchor='middle'%3E1%3C/text%3E%3Ctext x='20' y='20' font-family='Georgia%2C serif' font-size='14' font-weight='700' fill='%23FCD34D' text-anchor='middle'%3E%23%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F0F4FF;--bg2:#E8EEFF;--surface:rgba(255,255,255,.92);--surface2:rgba(240,244,255,.85);
  --border:rgba(99,102,241,.12);--border2:rgba(99,102,241,.22);
  --text:#0F1133;--muted:#5A6490;--faint:#9BA3CC;
  --indigo:#4F46E5;--indigo2:#818CF8;--indigo-g:rgba(79,70,229,.18);--indigo-s:rgba(79,70,229,.08);
  --gold:#D97706;--gold2:#F59E0B;--gold3:#FCD34D;--gold-g:rgba(217,119,6,.2);--gold-s:rgba(217,119,6,.08);
  --teal:#0D9488;--teal2:#2DD4BF;--teal-g:rgba(13,148,136,.2);--teal-s:rgba(13,148,136,.08);
  --sky:#0284C7;--sky2:#38BDF8;--sky-s:rgba(2,132,199,.08);
  --violet:#7C3AED;--violet2:#A78BFA;--violet-g:rgba(124,58,237,.18);--violet-s:rgba(124,58,237,.08);
  --rose2:#FB7185;--silver:#64748B;--silver2:#94A3B8;--bronze:#92400E;--bronze2:#B45309;
  --font-display:'Cinzel',serif;--font:'Outfit',sans-serif;
  --track-h:48px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* BACKGROUND CANVAS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#head-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* ── LOADING ── */
#loading{position:fixed;inset:0;z-index:9999;background:#F0F4FF;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;transition:opacity .8s,visibility .8s;}
#loading.hide{opacity:0;visibility:hidden;pointer-events:none;}
.ld-scene{position:relative;width:110px;height:110px;}
.ld-r1{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--gold2);border-right-color:rgba(245,158,11,.25);animation:spin 1.4s linear infinite;filter:drop-shadow(0 0 5px var(--gold-g));}
.ld-r2{position:absolute;inset:13px;border-radius:50%;border:2px solid transparent;border-bottom-color:var(--indigo);border-left-color:rgba(79,70,229,.25);animation:spin 2.1s linear infinite reverse;filter:drop-shadow(0 0 5px var(--indigo-g));}
.ld-r3{position:absolute;inset:25px;border-radius:50%;border:1.5px solid var(--teal-g);animation:spin 3s linear infinite;}
.ld-core{position:absolute;inset:34px;border-radius:50%;background:#ffffff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 0 1px var(--border2),0 4px 20px rgba(79,70,229,.12);}
.ld-core img{width:34px;height:34px;object-fit:contain;}
.ld-label{font-family:var(--font-display);font-size:.6rem;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--indigo);animation:lbPulse 2s ease infinite;}
@keyframes lbPulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOPBAR ── */
#topbar{position:relative;z-index:50;flex-shrink:0;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;background:rgba(255,255,255,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);box-shadow:0 1px 0 var(--border),0 4px 24px rgba(99,102,241,.07);}
#topbar::after{content:'';position:absolute;bottom:-1px;left:8%;right:8%;height:2px;background:linear-gradient(90deg,transparent,var(--indigo),var(--gold2),var(--indigo),transparent);opacity:.4;}
.tb-l{display:flex;align-items:center;gap:12px;}
.tb-logo-wrap{width:42px;height:42px;border-radius:11px;overflow:hidden;border:1.5px solid var(--border2);background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(79,70,229,.1);}
.tb-logo-wrap img{width:40px;height:40px;object-fit:contain;}
.tb-co{font-size:.9rem;font-weight:700;color:var(--text);}
.tb-tag{font-size:.56rem;color:var(--faint);margin-top:1px;}
.tb-c{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.tb-honor{font-family:var(--font-display);font-size:1.75rem;font-weight:900;letter-spacing:.14em;background:linear-gradient(135deg,var(--indigo) 0%,var(--gold2) 50%,var(--indigo) 100%);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:hGrad 6s ease infinite;line-height:1;}
@keyframes hGrad{0%,100%{background-position:0%}50%{background-position:100%}}
.tb-r{display:flex;align-items:center;gap:8px;opacity:.8;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#10B981;animation:blink 1.8s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
#tb-time{font-size:.62rem;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;}

/* ── ARENA ── */
#arena{flex:1;position:relative;overflow:hidden;z-index:2;}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:22px 36px;opacity:0;transform:translateY(18px) scale(.97);transition:opacity .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.34,1.15,.64,1);pointer-events:none;}
.slide.active{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.slide.exit{opacity:0;transform:translateY(-18px) scale(.97);}

/* ── DEPT HEADER ── */
.dept-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.dept-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);}
.dept-titles{text-align:center;}
.dept-chip{font-family:var(--font-display);font-size:1.35rem;font-weight:900;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(135deg,var(--indigo),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1.1;}
.dept-sub-chip{font-size:.62rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:block;margin-top:3px;}

.layout-2{display:flex;width:100%;max-width:1040px;flex-direction:column;}
.row-2{display:grid;grid-template-columns:1.42fr 1fr;gap:20px;align-items:start;}
.layout-3{display:flex;width:100%;max-width:1100px;flex-direction:column;}
.row-3{display:grid;grid-template-columns:1.45fr 1fr 1fr;gap:18px;align-items:start;}

/* ── HERO CARD ── */
.hero-card{background:rgba(255,255,255,.90);backdrop-filter:blur(20px);border-radius:24px;border:1.5px solid var(--border2);box-shadow:0 4px 6px rgba(79,70,229,.04),0 12px 40px rgba(79,70,229,.08),inset 0 1px 0 rgba(255,255,255,.9);padding:28px 24px;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;animation:cardIn .75s cubic-bezier(.34,1.3,.64,1) both;transition:transform .3s,box-shadow .3s;}
.hero-card:hover{transform:translateY(-5px);box-shadow:0 8px 12px rgba(79,70,229,.06),0 24px 60px rgba(79,70,229,.14),0 0 0 1.5px var(--indigo-g);}
.hero-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--indigo),var(--gold2),var(--teal),var(--indigo));background-size:200%;animation:barGrad 5s ease infinite;border-radius:24px 24px 0 0;}
@keyframes barGrad{0%,100%{background-position:0%}50%{background-position:100%}}
.hero-card::after{content:'';position:absolute;inset:0;border-radius:24px;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(79,70,229,.04),transparent 60%);}

.hero-photo-frame{width:175px;height:175px;border-radius:50%;position:relative;margin-bottom:18px;}
.hpf-ring{position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(var(--indigo) 0deg,var(--gold2) 72deg,var(--teal) 144deg,var(--violet) 216deg,var(--rose2) 288deg,var(--indigo) 360deg);animation:spin 10s linear infinite;z-index:0;filter:blur(.5px);}
.hpf-inner{position:absolute;inset:5px;border-radius:50%;z-index:1;background:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #fff,0 4px 20px rgba(79,70,229,.1);}
.hpf-inner img{width:100%;height:100%;object-fit:cover;}
.hero-initials{font-family:var(--font-display);font-size:3.6rem;font-weight:700;background:linear-gradient(135deg,var(--indigo),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.rank-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:.54rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.rt-gold  {background:var(--gold-s);color:var(--gold);border:1px solid rgba(217,119,6,.25);}
.rt-silver{background:rgba(100,116,139,.07);color:var(--silver);border:1px solid rgba(100,116,139,.2);}
.rt-bronze{background:rgba(180,83,9,.07);color:var(--bronze2);border:1px solid rgba(180,83,9,.2);}
.rt-blue  {background:var(--sky-s);color:var(--sky);border:1px solid rgba(2,132,199,.2);}
.rank-dot{width:5px;height:5px;border-radius:50%;}
.rt-gold .rank-dot{background:var(--gold2);box-shadow:0 0 4px var(--gold-g);}
.rt-silver .rank-dot{background:var(--silver2);}
.rt-bronze .rank-dot{background:var(--bronze2);}
.rt-blue .rank-dot{background:var(--sky2);}

.hero-name{font-family:var(--font-display);font-size:clamp(1.4rem,2.4vw,2rem);font-weight:700;text-align:center;line-height:1.1;color:var(--text);margin-bottom:5px;}
.hero-role{font-size:.7rem;color:var(--muted);font-weight:500;background:rgba(240,244,255,.9);border:1px solid var(--border2);padding:3px 12px;border-radius:8px;margin-bottom:16px;}
.hero-quote{font-size:.8rem;font-weight:300;color:var(--muted);font-style:italic;line-height:1.75;border-left:2px solid var(--indigo);padding-left:14px;margin-bottom:18px;text-align:left;width:100%;}
.hero-metrics{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;}
.mcard{flex:1;min-width:76px;background:rgba(240,244,255,.85);border:1.5px solid var(--border2);border-radius:14px;padding:12px 14px;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s;}
.mcard:hover{transform:translateY(-3px);}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
.mc-s::before{background:linear-gradient(90deg,var(--teal),var(--teal2));}.mc-s:hover{box-shadow:0 6px 20px var(--teal-g);}
.mc-d::before{background:linear-gradient(90deg,var(--indigo),var(--indigo2));}.mc-d:hover{box-shadow:0 6px 20px var(--indigo-g);}
.mc-t::before{background:linear-gradient(90deg,var(--violet),var(--violet2));}.mc-t:hover{box-shadow:0 6px 20px var(--violet-g);}
.mcard-label{font-size:.5rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;}
.mcard-val{font-family:var(--font-display);font-size:1.4rem;font-weight:700;line-height:1;}
.mc-s .mcard-val{color:var(--teal);}.mc-d .mcard-val{color:var(--indigo);}.mc-t .mcard-val{color:var(--violet);}

/* ── COMPACT CARD ── */
.compact-card{background:rgba(255,255,255,.86);backdrop-filter:blur(20px);border-radius:18px;border:1.5px solid var(--border);box-shadow:0 2px 4px rgba(79,70,229,.04),0 8px 28px rgba(79,70,229,.06);padding:20px;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;animation:cardIn .75s cubic-bezier(.34,1.3,.64,1) both;transition:transform .25s,box-shadow .25s;}
.compact-card:hover{transform:translateY(-3px);box-shadow:0 6px 8px rgba(79,70,229,.06),0 16px 40px rgba(79,70,229,.1);}
.compact-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:18px 18px 0 0;}
.cc-silver::before{background:linear-gradient(90deg,var(--silver),var(--silver2));}
.cc-bronze::before{background:linear-gradient(90deg,var(--bronze),var(--bronze2));}
.cc-4::before{background:linear-gradient(90deg,var(--sky),var(--sky2));}
.cc-5::before{background:linear-gradient(90deg,var(--violet),var(--violet2));}
.cc-top{display:flex;align-items:center;gap:13px;}
.cc-avatar{width:50px;height:50px;border-radius:50%;flex-shrink:0;background:rgba(240,244,255,.9);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:.9rem;font-weight:700;color:var(--indigo);overflow:hidden;border:2px solid var(--border2);}
.cc-silver .cc-avatar{color:var(--silver);border-color:rgba(100,116,139,.2);}
.cc-bronze .cc-avatar{color:var(--bronze2);border-color:rgba(180,83,9,.2);}
.cc-avatar img{width:100%;height:100%;object-fit:cover;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-family:var(--font-display);font-size:.98rem;font-weight:700;color:var(--text);line-height:1.2;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-role{font-size:.6rem;color:var(--muted);font-weight:500;margin-top:2px;}
.cc-metrics{display:flex;gap:8px;flex-wrap:wrap;}
.cc-pill{flex:1;min-width:64px;background:rgba(240,244,255,.85);border:1.5px solid var(--border2);border-radius:12px;padding:10px 12px;}
.cc-pill-label{font-size:.48rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin-bottom:4px;}
.cc-pill-val{font-family:var(--font-display);font-size:1.15rem;font-weight:700;line-height:1;}
.ccp-s .cc-pill-val{color:var(--teal);}.ccp-d .cc-pill-val{color:var(--indigo);}.ccp-t .cc-pill-val{color:var(--violet);}

@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.hero-card{animation-delay:.04s;}
.compact-card:nth-of-type(1){animation-delay:.16s;}
.compact-card:nth-of-type(2){animation-delay:.28s;}

/* ── PROGRESS BAR ── */

/* ── DOTS ── */
#dots{flex-shrink:0;height:44px;z-index:10;display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,.88);backdrop-filter:blur(16px);border-top:1px solid var(--border2);}
.dot{width:6px;height:6px;border-radius:100px;background:var(--faint);cursor:pointer;transition:background .3s,width .4s cubic-bezier(.34,1.3,.64,1),box-shadow .3s;}
.dot.on{background:linear-gradient(90deg,var(--indigo),var(--gold2));width:26px;box-shadow:0 0 10px rgba(79,70,229,.3);}

/* ══════════════════════════════════
   WALKER TRACK — sits on top of dots bar
══════════════════════════════════ */
#walker-track{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:var(--track-h);
  z-index:30;
  pointer-events:none;
  overflow:hidden;
}

/* The animated progress line that the walker "draws" */
#track-line{
  position:absolute;
  bottom:22px;
  left:0;
  height:2px;
  width:0%;
  background:linear-gradient(90deg,var(--indigo),var(--gold2),var(--teal));
  border-radius:0 2px 2px 0;
  box-shadow:0 0 6px rgba(79,70,229,.4);
  transition:width .06s linear;
}


/* The Walker character SVG */
#walker-char{
  position:absolute;
  bottom:0;
  left:0;
  width:52px;
  height:var(--track-h);
  will-change:left;
}

/* ── CELEBRATION ── */
#celeb{position:fixed;inset:0;z-index:800;display:none;align-items:center;justify-content:center;background:rgba(15,17,51,.5);backdrop-filter:blur(14px);}
#celeb.show{display:flex;}
#confetti{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.celeb-card{position:relative;z-index:2;background:rgba(12,16,34,.95);border-radius:28px;padding:52px 68px;text-align:center;border:1.5px solid var(--border2);box-shadow:0 0 0 6px rgba(79,70,229,.06),0 40px 100px rgba(15,17,51,.22),inset 0 1px 0 #fff;animation:celebIn .6s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes celebIn{from{opacity:0;transform:scale(.5) translateY(60px)}to{opacity:1;transform:scale(1) translateY(0)}}
.celeb-card.out{animation:celebOut .4s ease both;}
@keyframes celebOut{to{opacity:0;transform:scale(.87)}}
.celeb-ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.celeb-orn-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--indigo));}
.celeb-orn-line.r{background:linear-gradient(90deg,var(--indigo),transparent);}
.celeb-orn-diamond{width:8px;height:8px;background:var(--gold2);transform:rotate(45deg);box-shadow:0 0 10px var(--gold-g);}
.celeb-dept{font-family:var(--font-display);font-size:.56rem;font-weight:600;letter-spacing:.24em;text-transform:uppercase;color:var(--indigo);margin-bottom:12px;opacity:.7;}
.celeb-name{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;background:linear-gradient(135deg,var(--indigo),var(--gold2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.05;}
.celeb-label{font-size:.78rem;color:var(--muted);font-weight:400;margin-top:10px;letter-spacing:.05em;}

/* ── ANNOUNCEMENT ── */
#announce{position:fixed;inset:0;z-index:700;display:none;align-items:center;justify-content:center;pointer-events:none;}
#announce.show{display:flex;}
.ann-box{background:rgba(255,255,255,.97);color:var(--text);border:2px solid var(--indigo);border-radius:20px;padding:22px 40px;font-size:1.1rem;font-weight:700;box-shadow:0 0 0 8px rgba(79,70,229,.1),0 0 0 16px rgba(79,70,229,.05),0 24px 60px rgba(79,70,229,.2);animation:annPop .65s cubic-bezier(.34,1.9,.64,1) both;max-width:600px;text-align:center;line-height:1.5;}
@keyframes annPop{0%{opacity:0;transform:scale(.2) rotate(-12deg);}55%{opacity:1;transform:scale(1.1) rotate(2deg);}75%{transform:scale(.96) rotate(-1deg);}100%{transform:scale(1) rotate(0deg);}}
.ann-box.out{animation:annOut .4s ease both;}
@keyframes annOut{to{opacity:0;transform:scale(.8) rotate(6deg);}}

/* ── MUSIC ── */
#music{position:fixed;bottom:calc(var(--track-h) + 8px);right:22px;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border:1.5px solid var(--border2);border-radius:14px;padding:10px 14px;display:none;align-items:center;gap:10px;box-shadow:0 4px 24px rgba(79,70,229,.1);min-width:185px;}
.mus-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border2);background:var(--indigo-s);color:var(--indigo);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.78rem;transition:background .2s,color .2s;flex-shrink:0;pointer-events:auto;}
.mus-btn:hover{background:var(--indigo);color:#fff;}
.mus-info{flex:1;min-width:0;}
.mus-t{font-size:.68rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.mus-s{font-size:.56rem;color:var(--faint);margin-top:1px;}
.mus-bars{display:flex;align-items:flex-end;gap:2px;height:12px;}
.mb{width:3px;border-radius:2px;background:var(--indigo);animation:mba .8s ease-in-out infinite alternate;}
.mb:nth-child(1){height:5px;animation-delay:0s}.mb:nth-child(2){height:10px;animation-delay:.14s}.mb:nth-child(3){height:6px;animation-delay:.28s}.mb:nth-child(4){height:11px;animation-delay:.07s}.mb:nth-child(5){height:4px;animation-delay:.21s}
@keyframes mba{from{transform:scaleY(.2)}to{transform:scaleY(1)}}
.mus-bars.off .mb{animation-play-state:paused;}

async function loadData(){
  try{
    const r=await fetch(API_URL);
    const j=await r.json();
    return j.settings||j;
  }catch(e){
    document.getElementById('errbanner').classList.add('show');
    return DEMO.settings;
  }
}

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const INI=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
function get(d,k){return(d[k]||'').toString().trim();}
function metrics(d,prefix){
  const m=[];
  const s=get(d,prefix+'sales'),do_=get(d,prefix+'dos'),t=get(d,prefix+'tasks');
  if(s) m.push({l:'Sales',v:s.replace(/[$]/g,''),t:'s'});
  if(do_) m.push({l:"DO's",v:do_,t:'d'});
  if(t) m.push({l:'Tasks',v:t,t:'t'});
  return m;
}
function photoEl(url,name){
  if(url&&url.startsWith('http'))
    return`<img src="${url}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.outerHTML='<span class=hero-initials>${INI(name)}</span>'">`;
  return`<span class="hero-initials">${INI(name)}</span>`;
}
function mcards(ms){return ms.map(m=>`<div class="mcard mc-${m.t}"><div class="mcard-label">${m.l}</div><div class="mcard-val">${m.v}</div></div>`).join('');}
function ccPills(ms){return ms.map(m=>`<div class="cc-pill ccp-${m.t}"><div class="cc-pill-label">${m.l}</div><div class="cc-pill-val">${m.v}</div></div>`).join('');}
function rankTag(rank){
  const map={1:['rt-gold','No.1'],2:['rt-silver','No.2'],3:['rt-bronze','No.3'],4:['rt-blue','No.4'],5:['rt-blue','No.5']};
  const [cls,label]=map[rank]||['rt-blue',`No.${rank}`];
  return`<div class="rank-tag ${cls}"><div class="rank-dot"></div>${label}</div>`;
}
function heroCard(d,prefix,rank,delay=0){
  const name=get(d,prefix+'name'),role=get(d,prefix+'role'),img=get(d,prefix+'img')||get(d,prefix+'image_url'),comment=get(d,prefix+'comment'),ms=metrics(d,prefix);
  return`<div class="hero-card" style="animation-delay:${delay}s">
    <div class="hero-photo-frame"><div class="hpf-ring"></div><div class="hpf-inner">${photoEl(img,name)}</div></div>
    ${rankTag(rank)}
    <div class="hero-name">${name||'—'}</div>
    ${role?`<div class="hero-role">${role}</div>`:''}
    ${comment?`<div class="hero-quote">"${comment}"</div>`:''}
    ${ms.length?`<div class="hero-metrics">${mcards(ms)}</div>`:''}
  </div>`;
}
function compactCard(d,prefix,rank,ccCls,delay=0){
  const name=get(d,prefix+'name'),role=get(d,prefix+'role'),img=get(d,prefix+'img')||get(d,prefix+'image_url'),ms=metrics(d,prefix);
  const av=img&&img.startsWith('http')?`<img src="${img}" alt="${name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.textContent='${INI(name)}'">`:INI(name);
  return`<div class="compact-card ${ccCls}" style="animation-delay:${delay}s">
    <div class="cc-top"><div class="cc-avatar">${av}</div>
    <div class="cc-info">${rankTag(rank)}<div class="cc-name">${name||'—'}</div>${role?`<div class="cc-role">${role}</div>`:''}</div></div>
    ${ms.length?`<div class="cc-metrics">${ccPills(ms)}</div>`:''}
  </div>`;
}
function cleanDate(raw){
  if(!raw) return 'This Month';
  let s=raw.toString().trim();
  if(s.includes('GMT')||/^(Mon|Tue|Wed|Thu|Fri|Sat|Sun)/.test(s)){
    try{const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});}catch(e){}
    return 'This Month';
  }
  return s;
}
function deptHeader(label,month){
  return`<div class="dept-header">
    <div class="dept-line"></div>
    <div class="dept-titles"><div class="dept-chip">${label}</div><div class="dept-sub-chip">${cleanDate(month)}</div></div>
    <div class="dept-line"></div>
  </div>`;
}

/* ══════════════════════════════════════════
   BUILD SLIDES
══════════════════════════════════════════ */
function buildSlides(d){
  const arena=document.getElementById('arena');
  arena.querySelectorAll('.slide').forEach(s=>s.remove());
  slideEls=[];
  const month=get(d,'month_title')||'This Month';
  const prog=document.getElementById('prog');
  const defs=[
    {label:'SR Chaser Top Achievers',layout:'2',h1:'sr_chaser_1_',h2:'sr_chaser_2_',cc2:'cc-silver'},
    {label:'Chaser Top Achievers',layout:'3',h1:'chaser_1_',h2:'chaser_2_',cc2:'cc-silver',h3:'chaser_3_',cc3:'cc-bronze'},
    {label:'Opener-Closer Top Achievers',layout:'2',h1:'oc_1_',h2:'oc_2_',cc2:'cc-silver'},
    {label:'Opener Top Achievers',layout:'3',h1:'opener_1_',h2:'opener_2_',cc2:'cc-silver',h3:'opener_3_',cc3:'cc-bronze'},
  ];
  defs.forEach(def=>{
    const s=document.createElement('div'); s.className='slide';
    if(def.layout==='2'){
      s.innerHTML=`<div class="layout-2">${deptHeader(def.label,month)}<div class="row-2">${heroCard(d,def.h1,1,0)}${compactCard(d,def.h2,2,def.cc2,.15)}</div></div>`;
    } else {
      s.innerHTML=`<div class="layout-3">${deptHeader(def.label,month)}<div class="row-3">${heroCard(d,def.h1,1,0)}${compactCard(d,def.h2,2,def.cc2,.15)}${compactCard(d,def.h3,3,def.cc3,.28)}</div></div>`;
    }
    arena.insertBefore(s,prog); slideEls.push(s);
  });
  buildDots();
}

function buildDots(){
  const bar=document.getElementById('dots'); bar.innerHTML='';
  const labels=['SR Chaser','Chaser','Opener-Closer','Opener'];
  slideEls.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='dot'+(i===0?' on':'');
    d.title=labels[i]||`#${i+1}`;
    d.addEventListener('click',()=>{goTo(i,true);resetAuto();});
    bar.appendChild(d);
  });
}
function goTo(idx,manual=false){
  if(!slideEls.length)return;
  idx=((idx%slideEls.length)+slideEls.length)%slideEls.length;
  if(slideEls[cur]){slideEls[cur].classList.remove('active');slideEls[cur].classList.add('exit');}
  cur=idx;
  // Show celebration for No.1 on every slide transition
  showCeleb(cur);
  setTimeout(activate, CELEB_MS);
  startProg();
  document.querySelectorAll('#dots .dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
}
function activate(){
  slideEls.forEach((s,i)=>{s.classList.remove('active','exit');if(i===cur)s.classList.add('active');});
}
function startAuto(){clearTimeout(autoTimer);autoTimer=setTimeout(()=>{goTo(cur+1);startAuto();},SLIDE_MS);}
function resetAuto(){clearTimeout(autoTimer);startAuto();}

/* ══════════════════════════════════════════
   PROGRESS BAR + WALKER SYNC
══════════════════════════════════════════ */
let progPct = 0;
function startProg(){
  clearInterval(progTimer);
  progPct=0;
  const t0=Date.now();
  progTimer=setInterval(()=>{
    const p=Math.min(100,(Date.now()-t0)/SLIDE_MS*100);
    progPct=p;
    if(p>=100){clearInterval(progTimer);goTo(cur+1);startAuto();}
  },60);
}

/* ══════════════════════════════════════════
   WALKER — walks the progress track line
══════════════════════════════════════════ */
(function(){
  const trackLine = document.getElementById('track-line');
  const walkerChar = document.getElementById('walker-char');
  const wkTrophy  = document.getElementById('wk-trophy');
  const wkLL = document.getElementById('wk-ll');
  const wkRL = document.getElementById('wk-rl');
  const wkLA = document.getElementById('wk-la');
  const wkRA = document.getElementById('wk-ra');
  const wkHead = document.getElementById('wk-head');
  const wkShadow = document.getElementById('wk-shadow');

  let frame = 0;
  let atEnd = false;

  function lerp(a,b,t){return a+(b-a)*t;}
  function easeInOut(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

  function animWalker(){
    frame++;

    // pct from global progPct
    const pct = Math.min(progPct,99.8);
    const trackW = window.innerWidth;
    const charW  = 60;
    const margin = 10;
    const xPos   = margin + (pct/100) * (trackW - charW - margin*2);

    // Update track line width to match walker position
    const lineW = xPos + charW/2;
    trackLine.style.width = lineW + 'px';

    // Move walker
    walkerChar.style.left = xPos + 'px';

    // Check if reached end
    const newAtEnd = pct >= 97;
    if(newAtEnd !== atEnd){
      atEnd = newAtEnd;
      wkTrophy.style.opacity = atEnd ? '1' : '0';
    }

    // Walking animation — leg swing
    const speed = 8;
    const legSwing = Math.sin(frame * 0.18) * 10;
    const armSwing = Math.sin(frame * 0.18 + Math.PI) * 10;
    const bob      = Math.sin(frame * 0.18) * 1.5;

    // Left leg
    wkLL.setAttribute('x2', 18 + legSwing * 0.5);
    wkLL.setAttribute('y2', 50 + Math.abs(legSwing) * 0.08);
    // Right leg (opposite phase)
    wkRL.setAttribute('x2', 36 - legSwing * 0.5);
    wkRL.setAttribute('y2', 50 + Math.abs(-legSwing) * 0.08);
    // Left arm (opposite to left leg)
    wkLA.setAttribute('x2', 12 - armSwing * 0.4);
    wkLA.setAttribute('y2', 38 - Math.abs(armSwing) * 0.1);
    // Right arm
    wkRA.setAttribute('x2', 42 + armSwing * 0.4);
    wkRA.setAttribute('y2', 38 - Math.abs(-armSwing) * 0.1);
    // Head bob
    wkHead.setAttribute('cy', 20 + bob);
    // Shadow scale with bob
    const shadowScale = 0.85 + Math.abs(Math.sin(frame * 0.18)) * 0.15;
    wkShadow.setAttribute('rx', 12 * shadowScale);

    requestAnimationFrame(animWalker);
  }

  animWalker();
})();

/* ══════════════════════════════════════════
   AUDIO ENGINE
   Browser requires a user gesture before audio.
   The "Enable Sound" button calls unlockAndHide()
   which resumes the context once — after that
   all chimes fire freely at any time.
══════════════════════════════════════════ */
let _audioCtx = null;
let _audioUnlocked = false;

function getAudioCtx(){
  if(!_audioCtx){
    try{ _audioCtx = new(window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  return _audioCtx;
}

/* Auto-unlock audio on first any user interaction silently */
function _tryUnlock(){
  if(_audioUnlocked) return;
  const ctx = getAudioCtx();
  if(!ctx) return;
  ctx.resume().then(()=>{ _audioUnlocked = true; });
}
['click','touchstart','keydown','mousedown','scroll'].forEach(ev=>{
  document.addEventListener(ev, _tryUnlock, {passive:true});
});

function playChime(){
  const ctx = getAudioCtx();
  if(!ctx) return;

  const doPlay = () => {
    try{
      const now = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.value = 1.0;
      master.connect(ctx.destination);

      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -6;
      comp.ratio.value = 3;
      comp.connect(master);

      const notes = [
        {f:523,  t:0.00, dur:0.20, type:'square',   vol:0.35},
        {f:1047, t:0.00, dur:0.20, type:'triangle', vol:0.80},
        {f:1319, t:0.20, dur:0.20, type:'triangle', vol:0.85},
        {f:1568, t:0.40, dur:0.30, type:'triangle', vol:0.95},
        {f:2093, t:0.70, dur:0.50, type:'triangle', vol:0.75},
        {f:1568, t:1.20, dur:0.50, type:'sine',     vol:0.45},
      ];

      notes.forEach(({f,t,dur,type,vol})=>{
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.value = f;
        osc.connect(gain);
        gain.connect(comp);
        const s = now + t;
        gain.gain.setValueAtTime(0.001, s);
        gain.gain.linearRampToValueAtTime(vol, s + 0.02);
        gain.gain.setValueAtTime(vol, s + dur * 0.55);
        gain.gain.exponentialRampToValueAtTime(0.001, s + dur);
        osc.start(s);
        osc.stop(s + dur + 0.05);
      });

      const bass = ctx.createOscillator();
      const bassG = ctx.createGain();
      bass.type = 'sine';
      bass.frequency.setValueAtTime(160, now);
      bass.frequency.exponentialRampToValueAtTime(55, now + 0.15);
      bass.connect(bassG); bassG.connect(master);
      bassG.gain.setValueAtTime(0.7, now);
      bassG.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      bass.start(now); bass.stop(now + 0.22);

    } catch(e){ console.warn('playChime error:', e); }
  };

  if(ctx.state === 'suspended'){
    ctx.resume().then(doPlay);
  } else {
    doPlay();
  }
}

function launchConfetti(){
  const cvs=document.getElementById('confetti');

  const cols=['#1E40AF','#92400E','#D97706','#065F46','#4C1D95','#9F1239','#fff','#FBBF24'];
  const bits=Array.from({length:160},()=>({x:Math.random()*cvs.width,y:Math.random()*-cvs.height,w:5+Math.random()*9,h:3+Math.random()*5,c:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*3.5,vy:2+Math.random()*4,r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.14}));
  function draw(){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    bits.forEach(b=>{ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.r);ctx.fillStyle=b.c;ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);ctx.restore();b.x+=b.vx;b.y+=b.vy;b.r+=b.vr;if(b.y>cvs.height){b.y=-20;b.x=Math.random()*cvs.width;}});
    confAnim=requestAnimationFrame(draw);
  }
  draw();
}

/* ══════════════════════════════════════════
   BACKGROUND — Network + Wireframe Head
══════════════════════════════════════════ */
(function(){
  const bgCvs = document.getElementById('bg-canvas');
  const bgCtx = bgCvs.getContext('2d');
  const hCvs  = document.getElementById('head-canvas');
  const hCtx  = hCvs.getContext('2d');
  let W, H, t = 0;

  function resize(){
    W=bgCvs.width=hCvs.width=window.innerWidth;
    H=bgCvs.height=hCvs.height=window.innerHeight;
    buildHead();
  }

  /* ── NETWORK NODES ── */
  const NODE_COUNT=70;
  const COLS=[[99,102,241],[217,119,6],[13,148,136],[124,58,237],[2,132,199],[225,29,72],[16,185,129]];
  let nodes=[];
  function buildNodes(){
    nodes=Array.from({length:NODE_COUNT},()=>({
      x:Math.random(),y:Math.random()*.85+.05,
      vx:(Math.random()-.5)*.00035,vy:(Math.random()-.5)*.00022,
      r:1.5+Math.random()*6,col:COLS[Math.floor(Math.random()*COLS.length)],
      pulse:Math.random()*Math.PI*2,ps:0.012+Math.random()*.018,
      glow:Math.random()>.6,
    }));
  }

  /* ── WIREFRAME HEAD ── */
  let headVerts=[],headEdges=[];
  function buildHead(){
    headVerts=[];headEdges=[];
    const profile=[
      [-.55,.9,0],[-.65,.5,0],[-.62,-.1,0],[-.52,-.6,0],[-.35,-.9,0],
      [-.1,-1.05,0],[.0,-1.1,0],[.1,-1.05,0],[.35,-.9,0],[.52,-.6,0],
      [.58,-.1,0],[.62,.1,0],[.65,.4,0],[.6,.75,0],[.45,1.0,0],
      [.2,1.1,0],[-.2,1.1,0],[-.45,1.0,0],
    ];
    const face=[
      [-.3,.75,.3],[-.4,.3,.3],[-.38,-.15,.3],[-.3,-.55,.3],[-.1,-.82,.3],
      [.0,-.88,.3],[.1,-.82,.3],[.3,-.55,.3],[.38,-.15,.3],[.4,.3,.3],
      [.35,.75,.3],[.15,.95,.3],[-.15,.95,.3],
    ];
    const rings=[0,0.15,0.3,0.45,0.6];
    rings.forEach((z)=>{
      const scale=1-z*.35;
      profile.forEach(([px,py])=>headVerts.push([px*scale,py*scale,z-0.3]));
    });
    face.forEach(v=>headVerts.push(v));
    const PL=profile.length;
    rings.forEach((_,ri)=>{
      const base=ri*PL;
      for(let i=0;i<PL;i++){
        headEdges.push([base+i,base+(i+1)%PL]);
        if(ri<rings.length-1)headEdges.push([base+i,base+PL+i]);
      }
    });
    const fBase=rings.length*PL;
    face.forEach((_,i)=>{
      headEdges.push([fBase+i,fBase+(i+1)%face.length]);
      const lastRingBase=(rings.length-1)*PL;
      const nearest=Math.round(i/face.length*(PL-1));
      headEdges.push([fBase+i,lastRingBase+nearest]);
    });
  }

  function projectHead(v,cx,cy,rot,tilt,scale){
    const[x,y,z]=v;
    const rx=x*Math.cos(rot)-z*Math.sin(rot);
    const rz=x*Math.sin(rot)+z*Math.cos(rot);
    const ry2=y*Math.cos(tilt)-rz*Math.sin(tilt);
    const rz2=y*Math.sin(tilt)+rz*Math.cos(tilt);
    const fov=2.2,pz=rz2+fov;
    return{sx:(rx/pz)*scale+cx,sy:(ry2/pz)*scale+cy,depth:rz2};
  }

  function drawHead(){
    // Only clear the right portion for the head
    hCtx.clearRect(W*.5,0,W*.5,H);
    if(!headVerts.length)return;
    const cx=W*.78,cy=H*.5,sc=Math.min(W,H)*.28;
    const rot=Math.sin(t*0.025)*0.7+Math.sin(t*0.009)*0.3; // faster, wider sway
    const tilt=Math.sin(t*0.014)*0.18+Math.sin(t*0.022)*0.08;
    const proj=headVerts.map(v=>projectHead(v,cx,cy,rot,tilt,sc));
    const maxD=0.8,minD=-0.8;
    headEdges.forEach(([ai,bi])=>{
      if(ai>=proj.length||bi>=proj.length)return;
      const pa=proj[ai],pb=proj[bi];
      const avgD=(pa.depth+pb.depth)/2;
      const norm=(avgD-minD)/(maxD-minD);
      const r=Math.round(60+norm*160),g=Math.round(40+norm*80),b=Math.round(220-norm*120);
      const a=0.15+norm*0.55;
      hCtx.save();
      hCtx.strokeStyle=`rgba(${r+40},${g+20},${b},${a*0.4})`;
      hCtx.lineWidth=3.5;hCtx.shadowColor=`rgba(${r},${g},${b},0.6)`;hCtx.shadowBlur=14;
      hCtx.beginPath();hCtx.moveTo(pa.sx,pa.sy);hCtx.lineTo(pb.sx,pb.sy);hCtx.stroke();
      hCtx.restore();
      hCtx.save();
      hCtx.strokeStyle=`rgba(${r},${g},${b},${a})`;hCtx.lineWidth=0.8;
      hCtx.beginPath();hCtx.moveTo(pa.sx,pa.sy);hCtx.lineTo(pb.sx,pb.sy);hCtx.stroke();
      hCtx.restore();
    });
    proj.forEach((p,i)=>{
      if(i%3!==0)return;
      const norm=(p.depth-minD)/(maxD-minD);
      const r=80+norm*175,g=60+norm*60,b=200-norm*100;
      hCtx.save();
      hCtx.shadowColor=`rgba(${r},${g},${b},0.9)`;hCtx.shadowBlur=12;
      hCtx.fillStyle=`rgba(${r},${g},${b},${0.3+norm*0.5})`;
      hCtx.beginPath();hCtx.arc(p.sx,p.sy,1.2+norm*2,0,Math.PI*2);hCtx.fill();
      hCtx.restore();
    });
    const gPulse=0.5+Math.sin(t*0.06)*0.5; // faster pulse
    const grd=hCtx.createRadialGradient(cx+sc*.08,cy-sc*.08,0,cx+sc*.08,cy-sc*.08,sc*.6);
    grd.addColorStop(0,`rgba(200,80,80,${0.13*gPulse})`);
    grd.addColorStop(0.4,`rgba(240,110,40,${0.08*gPulse})`);
    grd.addColorStop(1,'rgba(0,0,0,0)');
    hCtx.fillStyle=grd;
    hCtx.beginPath();hCtx.ellipse(cx+sc*.08,cy-sc*.08,sc*.65,sc*.75,0,0,Math.PI*2);hCtx.fill();
  }

  function drawBG(){
    bgCtx.clearRect(0,0,W,H);
    const bgGrad=bgCtx.createRadialGradient(W*.3,H*.4,0,W*.5,H*.5,Math.max(W,H)*.9);
    bgGrad.addColorStop(0,'#F5F7FF');bgGrad.addColorStop(0.5,'#EEF2FF');bgGrad.addColorStop(1,'#E8EEFF');
    bgCtx.fillStyle=bgGrad;bgCtx.fillRect(0,0,W,H);
    [[W*.15,H*.35,W*.38,'rgba(99,102,241,.07)'],[W*.78,H*.28,W*.30,'rgba(245,158,11,.05)'],[W*.5,H*.85,W*.40,'rgba(13,148,136,.05)']].forEach(([gx,gy,gr,col])=>{
      const g2=bgCtx.createRadialGradient(gx,gy,0,gx,gy,gr);
      g2.addColorStop(0,col);g2.addColorStop(1,'rgba(0,0,0,0)');
      bgCtx.fillStyle=g2;bgCtx.fillRect(0,0,W,H);
    });
    nodes.forEach(n=>{n.x+=n.vx;n.y+=n.vy;if(n.x<0)n.x=1;if(n.x>1)n.x=0;if(n.y<.02)n.y=.98;if(n.y>.98)n.y=.02;n.pulse+=n.ps;});
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const a=nodes[i],b=nodes[j];
        const dx=(a.x-b.x)*W,dy=(a.y-b.y)*H;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<180){
          const alpha=(1-dist/180)*.18;
          const gline=bgCtx.createLinearGradient(a.x*W,a.y*H,b.x*W,b.y*H);
          gline.addColorStop(0,`rgba(${a.col[0]},${a.col[1]},${a.col[2]},${alpha})`);
          gline.addColorStop(1,`rgba(${b.col[0]},${b.col[1]},${b.col[2]},${alpha})`);
          bgCtx.beginPath();bgCtx.strokeStyle=gline;bgCtx.lineWidth=.7;bgCtx.moveTo(a.x*W,a.y*H);bgCtx.lineTo(b.x*W,b.y*H);bgCtx.stroke();
        }
      }
    }
    nodes.forEach(n=>{
      const pulse=.7+Math.sin(n.pulse)*.3;
      const[r,g,b]=n.col,nr=n.r*pulse;
      if(n.glow){bgCtx.save();bgCtx.shadowColor=`rgb(${r},${g},${b})`;bgCtx.shadowBlur=nr*4;bgCtx.fillStyle=`rgba(${r},${g},${b},.85)`;bgCtx.beginPath();bgCtx.arc(n.x*W,n.y*H,nr*.7,0,Math.PI*2);bgCtx.fill();bgCtx.restore();}
      bgCtx.fillStyle=`rgba(${r},${g},${b},${.3+pulse*.22})`;bgCtx.beginPath();bgCtx.arc(n.x*W,n.y*H,nr,0,Math.PI*2);bgCtx.fill();
      bgCtx.fillStyle='rgba(255,255,255,.35)';bgCtx.beginPath();bgCtx.arc(n.x*W-nr*.2,n.y*H-nr*.2,nr*.3,0,Math.PI*2);bgCtx.fill();
    });
  }

  function loop(){t++;drawBG();drawHead();requestAnimationFrame(loop);}

  resize();buildNodes();loop();
  window.addEventListener('resize',()=>{resize();buildNodes();});
})();
